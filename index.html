<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Maker - @D3LTA_CV</title>
    <!-- Icons and Screenshot Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <script src="https://html2canvas.hertzen.com"></script>
    <style>
        :root {
            --header-h: 50px;
            --sidebar-w: 25vw;
            --tab-w: 60px;
            --accent-gold: #bf9739;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Apple SD Gothic Neo', sans-serif; background: #1a1a1a; color: #eee; overflow: hidden; }

        /* 1. Header */
        header {
            height: var(--header-h); background: #111; display: flex;
            align-items: center; padding: 0 20px; border-bottom: 1px solid #333; z-index: 100;
        }
        .header-title { font-size: 20px; font-weight: bold; margin-right: 16px; }
        .author-id { color: #888; font-size: 14px; flex-grow: 1; }
        
        .header-controls { display: flex; align-items: center; gap: 10px; margin-right: 20px; }
        .icon-btn {
            width: 32px; height: 32px; background: #2a2a2a; border: 1px solid #444;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            color: #fff; text-decoration: none; cursor: pointer; transition: 0.2s;
        }
        .icon-btn:hover { border-color: var(--accent-gold); background: #333; }
        
        .save-btn {
            padding: 8px 20px; background: #5e0000; color: white; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .save-btn:hover { background: #8b0000; box-shadow: 0 0 10px rgba(139,0,0,0.5); }

        /* Main Container */
        .wrapper { display: flex; height: calc(100% - var(--header-h)); }

        /* 2. Left Box (Sidebar 1/4) */
        .sidebar { width: var(--sidebar-w); display: flex; background: #222; border-right: 1px solid #000; z-index: 50; }
        .side-tabs {
            width: var(--tab-w); background: #151515; display: flex;
            flex-direction: column; align-items: center; padding-top: 20px; gap: 20px;
        }
        .tab-icon { color: #555; cursor: pointer; font-size: 20px; transition: 0.3s; }
        .tab-icon.active { color: var(--accent-gold); }

        .editor-area { flex: 1; padding: 25px; overflow-y: auto; }
        .field { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: #ff4444; font-size: 12px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }

        /* 3. Right Box (Workspace #4a4645) */
        .workspace {
            flex: 1; background: #4a4645; display: flex;
            align-items: center; justify-content: center; position: relative; 
            overflow: hidden; cursor: grab;
        }
        .workspace:active { cursor: grabbing; }

        /* Preview Board: 1200x900, 2px Round, 0.7px Gold Border, 15px Soft Shadow */
        #preview-board {
            width: 1200px; height: 900px; min-width: 1200px; min-height: 900px;
            background: #ffffff; border-radius: 2px;
            border: 0.7px solid var(--accent-gold);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.25);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
            transform-origin: center center;
            user-select: none;
        }
        #uploaded-img { width: 100%; height: 100%; object-fit: cover; display: none; pointer-events: none; }
        .placeholder { color: #ccc; font-size: 32px; font-weight: bold; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">Sheet Maker</div>
        <div class="author-id">@D3LTA_CV</div>
        <div class="header-controls">
            <a href="https://twitter.com" target="_blank" class="icon-btn" title="Twitter">
                <i class="fa-brands fa-twitter"></i>
            </a>
            <div class="icon-btn" onclick="alert('도움말:\n- 배경 이미지를 업로드하세요.\n- 마우스 휠로 확대/축소 가능합니다.\n- 좌클릭 드래그로 화면 이동이 가능합니다.')">
                <i class="fa-solid fa-question"></i>
            </div>
        </div>
        <button class="save-btn" onclick="saveImage()">Save as PNG</button>
    </header>

    <div class="wrapper">
        <div class="sidebar">
            <div class="side-tabs">
                <i class="fa-solid fa-pen-nib tab-icon active" title="기본 정보"></i>
                <i class="fa-solid fa-palette tab-icon" title="색상 설정"></i>
                <i class="fa-solid fa-font tab-icon" title="폰트 설정"></i>
            </div>
            <div class="editor-area">
                <div class="field">
                    <label>이미지 업로드 (1200x900)</label>
                    <input type="file" id="imgInp" accept="image/*">
                </div>
                <div class="field"><label>닉네임</label><input type="text" placeholder="이름을 입력하세요"></div>
                <div class="field"><label>자기소개</label><textarea rows="6" placeholder="내용을 입력하세요"></textarea></div>
            </div>
        </div>

        <div class="workspace" id="workspace">
            <div id="preview-board">
                <img id="uploaded-img" src="">
                <div class="placeholder" id="placeholder">
                    1200 x 900 PREVIEW<br>
                    <small style="font-size: 14px; font-weight: normal;">(Wheel: Zoom / Drag: Move)</small>
                </div>
            </div>
        </div>
    </div>

    <script>
        const imgInp = document.getElementById('imgInp');
        const img = document.getElementById('uploaded-img');
        const placeholder = document.getElementById('placeholder');
        const board = document.getElementById('preview-board');
        const workspace = document.getElementById('workspace');

        // 1. Image Upload
        imgInp.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                img.src = ev.target.result;
                img.style.display = 'block';
                placeholder.style.display = 'none';
            };
            reader.readAsDataURL(e.target.files);
        };

        // 2. Zoom & Pan State
        let scale = 0.5;
        let pos = { x: 0, y: 0 };
        let startPos = { x: 0, y: 0 };
        let isDragging = false;

        const updateTransform = () => {
            board.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(${scale})`;
        };

        // 3. Wheel Zoom
        workspace.onwheel = (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            scale = Math.min(Math.max(0.1, scale + delta), 3);
            updateTransform();
        };

        // 4. Drag to Move
        workspace.onmousedown = (e) => {
            if(e.button !== 0) return;
            isDragging = true;
            startPos = { x: e.clientX - pos.x, y: e.clientY - pos.y };
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            pos.x = e.clientX - startPos.x;
            pos.y = e.clientY - startPos.y;
            updateTransform();
        };

        window.onmouseup = () => { isDragging = false; };

        // 5. Save Image
        function saveImage() {
            const oldTransform = board.style.transform;
            board.style.transform = 'none'; 
            html2canvas(board, { width: 1200, height: 900 }).then(canvas => {
                const a = document.createElement('a');
                a.download = 'D3LTA_Sheet.png';
                a.href = canvas.toDataURL();
                a.click();
                board.style.transform = oldTransform;
            });
        }

        updateTransform();
    </script>
</body>
</html>

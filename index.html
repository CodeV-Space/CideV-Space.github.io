<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Maker - @D3LTA_CV</title>
    <!-- Icons and Screenshot Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <script src="https://html2canvas.hertzen.com"></script>
    <style>
        :root {
            --header-h: 35px;
            --sidebar-w: 25vw;
            --tab-w: 55px;
            --accent-gold: #bf9739;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Apple SD Gothic Neo', sans-serif; background: #1a1a1a; color: #eee; overflow: hidden; }

        /* 1. Header Area */
        header {
            height: var(--header-h); background: #111; display: flex;
            align-items: center; justify-content: space-between; padding: 0 15px;
            border-bottom: 1px solid #333;
        }
        .header-title { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .header-right { display: flex; align-items: center; gap: 12px; font-size: 12px; }
        
        .header-btn {
            width: 24px; height: 24px; background: #2a2a2a; border: 1px solid #444;
            border-radius: 5px; display: flex; align-items: center; justify-content: center;
            color: #fff; text-decoration: none; cursor: pointer; transition: 0.2s;
        }
        .header-btn:hover { border-color: var(--accent-gold); background: #333; }

        /* Main Wrapper */
        .wrapper { display: flex; height: calc(100% - var(--header-h)); }

        /* 2. Sidebar (1/4 Width) */
        .sidebar { width: var(--sidebar-w); display: flex; background: #222; border-right: 1px solid #000; }
        .side-tabs {
            width: var(--tab-w); background: #151515; display: flex;
            flex-direction: column; align-items: center; padding-top: 20px; gap: 20px;
        }
        .tab-icon { color: #555; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .tab-icon.active { color: var(--accent-gold); }

        .editor-area { flex: 1; padding: 25px; overflow-y: auto; }
        .field { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: #ff4444; font-size: 11px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }

        /* 3. Right Workspace Area (#4a4645) */
        .workspace {
            flex: 1; background: #4a4645; display: flex;
            align-items: center; justify-content: center; position: relative; overflow: auto; padding: 60px;
        }

        /* 1200x900 Board: 2px Round, 0.7px Gold Border, 15px Soft Shadow (25%) */
        #preview-board {
            width: 1200px; height: 900px; min-width: 1200px; min-height: 900px;
            background: #ffffff; border-radius: 2px;
            border: 0.7px solid var(--accent-gold);
            /* Feathered/Soften Outer Glow at 25% Opacity */
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.25);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
            transform: scale(0.45); transform-origin: center;
        }
        #uploaded-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .placeholder { color: #ccc; font-size: 32px; font-weight: bold; text-align: center; }

        /* Save Button */
        .save-btn {
            position: absolute; bottom: 30px; right: 30px;
            padding: 15px 30px; background: #5e0000; color: white;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer;
        }
        .save-btn:hover { background: #8b0000; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">Sheet Generator v1.0</div>
        <div class="header-right">
            <span>@D3LTA_CV</span>
            <a href="https://twitter.com" target="_blank" class="header-btn">
                <i class="fa-brands fa-twitter"></i>
            </a>
            <div class="header-btn" onclick="alert('도움말: 이미지를 업로드하고 내용을 기입한 뒤 저장하세요.')">
                <i class="fa-solid fa-question"></i>
            </div>
        </div>
    </header>

    <div class="wrapper">
        <div class="sidebar">
            <div class="side-tabs">
                <i class="fa-solid fa-pen-nib tab-icon active" title="INFO"></i>
                <i class="fa-solid fa-palette tab-icon" title="COLOR"></i>
                <i class="fa-solid fa-font tab-icon" title="FONT"></i>
            </div>
            <div class="editor-area">
                <div class="field">
                    <label>BACKGROUND IMAGE</label>
                    <input type="file" id="imgInp" accept="image/*">
                </div>
                <div class="field"><label>NICKNAME / ID</label><input type="text" placeholder="이름을 입력하세요"></div>
                <div class="field"><label>INTRODUCTION</label><textarea rows="6" placeholder="자신을 소개하는 내용을 입력하세요"></textarea></div>
            </div>
        </div>

        <div class="workspace">
            <div id="preview-board">
                <img id="uploaded-img" src="">
                <div class="placeholder" id="placeholder">1200 x 900 PREVIEW</div>
            </div>
            <button class="save-btn" onclick="saveImage()">Save as PNG</button>
        </div>
    </div>

    <script>
        const imgInp = document.getElementById('imgInp');
        const img = document.getElementById('uploaded-img');
        const placeholder = document.getElementById('placeholder');

        imgInp.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                img.src = ev.target.result;
                img.style.display = 'block';
                placeholder.style.display = 'none';
            };
            reader.readAsDataURL(e.target.files);
        };

        function saveImage() {
            const board = document.getElementById('preview-board');
            board.style.transform = 'none';
            html2canvas(board, { width: 1200, height: 900 }).then(canvas => {
                const a = document.createElement('a');
                a.download = 'D3LTA_Sheet.png';
                a.href = canvas.toDataURL();
                a.click();
                board.style.transform = 'scale(0.45)';
            });
        }
    </script>
</body>
</html>

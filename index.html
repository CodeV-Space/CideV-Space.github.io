<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Vein Ⅱ Sheet Maker</title>
    
    <!-- Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* --- CSS Variables --- */
        :root {
            /* Theme Colors */
            --accent-gold: #D3AF37;   /* Main Accent */
            --accent-blood: #760000;  /* Easter Egg Color */
            --current-accent: var(--accent-gold); /* Dynamic Variable */

            /* UI Colors */
            --bg-frame: #121212;
            --bg-header: #2a2a2a;
            --bg-tab-inactive: #1a1a1a;
            --bg-workspace: #4a4645;
            --bg-sidebar: #2d2a29;
            --bg-rail: #1e1c1b;
            
            --text-white: #ffffff;
            --text-sub: #aaaaaa;

            /* Dimensions */
            --tab-h: 42px;
            --address-h: 50px;
            --editor-w: 320px;
        }

        /* --- Base Reset --- */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-frame);
            color: var(--text-white);
            overflow: hidden;
            user-select: none;
        }

        /* --- 1. Window Controls (Top Right) --- */
        .window-controls {
            position: absolute; top: 0; right: 0;
            height: var(--tab-h);
            display: flex;
            z-index: 200;
            -webkit-app-region: no-drag;
        }
        .win-btn {
            width: 46px; height: 100%;
            display: flex; align-items: center; justify-content: center;
            color: #888; font-size: 12px; cursor: pointer; transition: 0.2s;
        }
        .win-btn:hover { background-color: #333; color: #fff; }
        .win-btn.close:hover { background-color: #e81123; color: #fff; }

        /* --- 2. Browser Tab Bar --- */
        .browser-top {
            height: var(--tab-h);
            background-color: var(--bg-frame);
            display: flex; align-items: flex-end;
            padding-left: 10px; gap: 6px;
            padding-right: 140px;
            -webkit-app-region: drag;
        }

        .tab {
            height: 32px; padding: 0 20px;
            background-color: var(--bg-tab-inactive);
            color: #888;
            border-radius: 10px 10px 0 0;
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; font-weight: 700; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s ease;
            position: relative;
        }
        .tab:hover { background-color: #333; color: #ccc; transform: scale(1.02); transform-origin: bottom; }
        
        .tab.active {
            height: 36px;
            background-color: var(--bg-header);
            color: var(--text-white);
            z-index: 10;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.2);
            transform: none;
        }

        .tab-icon { 
            width: 18px; height: 18px; 
            object-fit: cover; 
            border-radius: 4px; /* Icon Corners Rounded */
        }

        .tab-plus {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            color: #888; cursor: pointer; border-radius: 50%;
            transition: 0.2s; margin-bottom: 2px;
        }
        .tab-plus:hover { background-color: #333; color: #fff; }

        /* --- 3. Address Bar --- */
        .address-bar-row {
            height: var(--address-h);
            background-color: var(--bg-header);
            border-bottom: 1px solid #000;
            display: flex; align-items: center;
            padding: 0 20px; gap: 16px;
            position: relative; z-index: 9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .nav-controls { display: flex; gap: 8px; color: #888; font-size: 14px; }
        .nav-btn { 
            cursor: pointer; transition: 0.2s; width: 30px; height: 30px; 
            display: flex; align-items: center; justify-content: center; border-radius: 50%; 
        }
        .nav-btn:hover { background-color: #444; color: #fff; }

        .address-input {
            flex: 1; height: 32px;
            background-color: #1a1a1a;
            border: 1px solid #444;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            color: #ddd; font-size: 14px;
            font-family: 'Segoe UI', sans-serif; letter-spacing: 0.5px;
        }
        .address-input i { margin-right: 8px; color: #666; font-size: 12px; }

        .right-controls { display: flex; align-items: center; gap: 12px; }
        .author-id { font-size: 14px; color: #888; font-weight: 500; margin-right: 4px; }
        
        .icon-btn {
            width: 32px; height: 32px;
            background: #333; border: 1px solid #555; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            color: #ccc; text-decoration: none; cursor: pointer;
            transition: all 0.2s;
        }
        .icon-btn:hover { border-color: var(--current-accent); color: var(--current-accent); background: #444; }

        /* --- 4. Main Layout --- */
        .main-wrapper {
            display: flex;
            height: calc(100vh - var(--tab-h) - var(--address-h));
            width: 100vw; position: relative;
        }

        /* Sidebar */
        .sidebar-container {
            display: flex; background: var(--bg-sidebar); border-right: 1px solid #000;
            position: relative; z-index: 20;
        }
        .tab-rail {
            width: 60px; min-width: 60px; background: var(--bg-rail); border-right: 1px solid #333;
            display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 15px;
            z-index: 22;
        }
        .tab-icon-btn {
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            color: #666; cursor: pointer; border-radius: 8px; font-size: 18px; transition: 0.2s;
        }
        .tab-icon-btn.active, .tab-icon-btn:hover { color: var(--current-accent); background: rgba(255,255,255,0.08); }

        /* Collapsible Panel */
        .editor-panel {
            width: var(--editor-w); background: var(--bg-sidebar);
            display: flex; flex-direction: column; overflow: hidden;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-container.collapsed .editor-panel { width: 0px; }

        .editor-content { flex: 1; padding: 20px; width: var(--editor-w); box-sizing: border-box; overflow-y: auto; }

        /* Toggle Button */
        .toggle-btn {
            position: absolute; right: -20px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 50px; background: #222;
            border: 1px solid #000; border-left: none; border-radius: 0 8px 8px 0;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: var(--current-accent); z-index: 25; font-size: 10px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
        }

        /* Form Inputs */
        .section-title { font-size: 16px; font-weight: 700; color: var(--current-accent); border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        .input-label { display: block; margin-bottom: 8px; font-size: 12px; color: #aaa; }
        input[type="text"], textarea {
            width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #444;
            color: #fff; border-radius: 4px; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif;
        }
        input[type="file"] {
            width: 100%; padding: 10px; background: #1a1a1a; border: 1px dashed #555;
            color: #888; font-size: 12px; cursor: pointer; box-sizing: border-box;
        }

        .sidebar-footer { padding: 20px; border-top: 1px solid #333; width: var(--editor-w); box-sizing: border-box; }
        .save-btn {
            width: 100%; height: 40px; background-color: var(--current-accent); color: #111;
            border: none; border-radius: 4px; font-weight: bold; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.2s;
        }
        .save-btn:hover { filter: brightness(1.1); }

        /* --- 5. Workspace (Preview) --- */
        .workspace {
            flex: 1; background-color: var(--bg-workspace);
            position: relative; overflow: hidden; cursor: grab;
            display: flex; align-items: center; justify-content: center;
        }
        .workspace:active { cursor: grabbing; }
        #viewport { transform-origin: center center; transition: transform 0.1s ease-out; will-change: transform; }

        /* 4K Preview Board */
        .preview-box {
            width: 3840px; height: 2160px; background-color: #ffffff;
            position: relative; display: flex; align-items: center; justify-content: center;
            
            border-radius: 30px; /* Smooth 30px */
            overflow: hidden;
            border: 0.7px solid var(--current-accent); /* Gold Border */
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.25); /* 25% Dark Shadow */
        }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .placeholder-text { font-size: 80px; font-weight: 700; color: #ddd; pointer-events: none; }

        /* Real-time Text Overlays */
        .overlay-text { position: absolute; pointer-events: none; }
        #render-name { 
            top: 150px; left: 150px; 
            font-size: 120px; font-weight: bold; color: #000; 
            font-family: 'Cinzel', serif;
        }
        #render-desc { 
            top: 350px; left: 150px; 
            font-size: 50px; color: #333; 
            width: 3000px; white-space: pre-wrap; 
            line-height: 1.5;
        }

        /* --- 6. Helper Box --- */
        .helper-box {
            position: absolute; bottom: 30px; right: 30px;
            background-color: rgba(30, 30, 30, 0.7); /* Opacity 70% */
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            color: #eee; font-size: 13px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden; cursor: pointer; z-index: 50;
        }

        .helper-box:not(.minimized) { height: 60px; display: flex; align-items: center; padding: 0 30px; gap: 20px; }
        .helper-box.minimized { width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .helper-content { display: flex; align-items: center; gap: 20px; white-space: nowrap; }
        
        .helper-item { display: flex; align-items: center; gap: 8px; }
        .helper-item i { color: var(--current-accent); font-size: 14px; }
        .divider { width: 1px; height: 16px; background: rgba(255,255,255,0.2); }
        .helper-strong { font-weight: 700; color: #fff; margin-right: 5px; }
        
        .minimized-icon { display: none; font-size: 20px; color: var(--current-accent); }
        .helper-box.minimized .helper-content { display: none; }
        .helper-box.minimized .minimized-icon { display: block; }

    </style>
</head>
<body>

    <!-- Top Right Window Controls -->
    <div class="window-controls">
        <div class="win-btn"><i class="fa-solid fa-minus"></i></div>
        <div class="win-btn"><i class="fa-regular fa-square"></i></div>
        <div class="win-btn close"><i class="fa-solid fa-xmark"></i></div>
    </div>

    <!-- 1. Tab Bar -->
    <div class="browser-top">
        <!-- Inactive Tab -->
        <div class="tab">
            <img src="Icons/Titles/CV1.png" class="tab-icon" alt="CV1"> CODE VEIN
        </div>
        <!-- Active Tab -->
        <div class="tab active">
            <img src="Icons/Titles/CV2.png" class="tab-icon" alt="CV2"> CODE VEIN Ⅱ
        </div>
        <!-- Easter Egg Tab -->
        <div class="tab" id="eggTab">TBA</div>
        <!-- Plus Button -->
        <div class="tab-plus"><i class="fa-solid fa-plus"></i></div>
    </div>

    <!-- 2. Address Bar -->
    <div class="address-bar-row">
        <div class="nav-controls">
            <div class="nav-btn"><i class="fa-solid fa-arrow-left"></i></div>
            <div class="nav-btn"><i class="fa-solid fa-arrow-right"></i></div>
            <div class="nav-btn" onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i></div>
        </div>

        <div class="address-input">
            <i class="fa-solid fa-lock"></i> https://codevein.sheet/2/main
        </div>

        <div class="right-controls">
            <span class="author-id">Made by @D3LTA_CV</span>
            <a href="https://x.com/D3LTA_CV" target="_blank" class="icon-btn" title="Twitter">
                <i class="fa-brands fa-x-twitter"></i>
            </a>
            <div class="icon-btn" title="Help" onclick="alert('화면 우측 하단을 확인하세요.')">
                <i class="fa-solid fa-question"></i>
            </div>
        </div>
    </div>

    <!-- 3. Main Layout -->
    <div class="main-wrapper">
        
        <!-- Sidebar -->
        <aside class="sidebar-container" id="sidebar">
            <!-- Fixed Rail -->
            <div class="tab-rail">
                <div class="tab-icon-btn active"><i class="fa-solid fa-pen-to-square"></i></div>
                <div class="tab-icon-btn"><i class="fa-solid fa-palette"></i></div>
                <div class="tab-icon-btn"><i class="fa-solid fa-font"></i></div>
            </div>
            
            <!-- Editor Panel -->
            <div class="editor-panel">
                <div class="editor-content">
                    <div class="section-title">기본 설정</div>
                    <div class="input-group">
                        <label class="input-label">배경 이미지 (4K)</label>
                        <input type="file" id="imgInput" accept="image/*">
                    </div>
                    <div class="input-group">
                        <label class="input-label">캐릭터 이름</label>
                        <input type="text" id="inputName" placeholder="이름을 입력하세요">
                    </div>
                    <div class="input-group">
                        <label class="input-label">메모 / 설정</label>
                        <textarea id="inputDesc" rows="6" placeholder="내용을 입력하세요..."></textarea>
                    </div>
                </div>
                
                <div class="sidebar-footer">
                    <button class="save-btn" onclick="saveImage()">
                        <i class="fa-solid fa-download"></i> PNG로 저장
                    </button>
                </div>
            </div>

            <!-- Sidebar Toggle -->
            <div class="toggle-btn" id="toggleBtn" title="Toggle Panel">
                <i class="fa-solid fa-chevron-left" id="toggleIcon"></i>
            </div>
        </aside>

        <!-- Workspace -->
        <section class="workspace" id="workspace">
            <div id="viewport">
                <div class="preview-box" id="board">
                    <span class="placeholder-text">PREVIEW AREA</span>
                    <img id="preview-img" src="" alt="">
                    
                    <!-- Real-time Layers -->
                    <div id="render-name" class="overlay-text"></div>
                    <div id="render-desc" class="overlay-text"></div>
                </div>
            </div>

            <!-- Helper Box (Opacity 70%) -->
            <div class="helper-box" id="helperBox" title="클릭하여 최소화/확대">
                <i class="fa-solid fa-info-circle minimized-icon"></i>
                <div class="helper-content">
                    <div class="helper-item">
                        <i class="fa-solid fa-computer-mouse"></i>
                        <span class="helper-strong">조작법</span>
                    </div>
                    <div class="divider"></div>
                    <div class="helper-item">
                        <i class="fa-solid fa-hand-pointer"></i> <span>드래그: 이동</span>
                    </div>
                    <div class="helper-item">
                        <i class="fa-solid fa-magnifying-glass"></i> <span>휠: 확대/축소</span>
                    </div>
                    <div class="helper-item">
                        <i class="fa-solid fa-arrow-rotate-left"></i> <span>휠 클릭: 중앙 정렬</span>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // --- Elements ---
        const workspace = document.getElementById('workspace');
        const viewport = document.getElementById('viewport');
        const board = document.getElementById('board');
        
        // Inputs
        const imgInput = document.getElementById('imgInput');
        const inputName = document.getElementById('inputName');
        const inputDesc = document.getElementById('inputDesc');
        
        // Outputs
        const previewImg = document.getElementById('preview-img');
        const placeholder = document.querySelector('.placeholder-text');
        const renderName = document.getElementById('render-name');
        const renderDesc = document.getElementById('render-desc');
        
        // UI Controls
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggleBtn');
        const toggleIcon = document.getElementById('toggleIcon');
        const helperBox = document.getElementById('helperBox');
        const eggTab = document.getElementById('eggTab');

        // --- 1. Real-time Binding ---
        inputName.addEventListener('input', (e) => {
            renderName.innerText = e.target.value;
        });
        inputDesc.addEventListener('input', (e) => {
            renderDesc.innerText = e.target.value;
        });

        // --- 2. Sidebar Toggle ---
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                toggleIcon.className = 'fa-solid fa-chevron-right';
            } else {
                toggleIcon.className = 'fa-solid fa-chevron-left';
            }
        });

        // --- 3. Helper Box Toggle ---
        helperBox.addEventListener('click', () => {
            helperBox.classList.toggle('minimized');
        });

        // --- 4. Easter Egg (7 Clicks) ---
        let eggCount = 0;
        eggTab.addEventListener('click', () => {
            eggCount++;
            if (eggCount >= 7) {
                // Change global accent color variable
                document.documentElement.style.setProperty('--current-accent', '#760000');
                // Optionally change text content or alert
                console.log("Easter Egg Activated: Blood Mode");
            }
        });

        // --- 5. Viewport Logic ---
        const INITIAL_SCALE = 0.15; 
        let scale = INITIAL_SCALE;
        let isDragging = false;
        let startX, startY, pointX = 0, pointY = 0;

        function updateTransform() {
            viewport.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        }
        updateTransform();

        // Image Upload
        imgInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImg.src = event.target.result;
                    previewImg.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // Zoom
        workspace.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            scale = Math.min(Math.max(0.05, scale + delta), 3);
            updateTransform();
        }, { passive: false });

        // Pan & Reset
        workspace.addEventListener('mousedown', (e) => {
            if (e.button === 1) { // Middle Click
                e.preventDefault();
                scale = INITIAL_SCALE;
                pointX = 0; pointY = 0;
                updateTransform();
                return;
            }
            if (e.button === 0) { // Left Click
                isDragging = true;
                startX = e.clientX - pointX;
                startY = e.clientY - pointY;
                workspace.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            pointX = e.clientX - startX;
            pointY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            workspace.style.cursor = 'grab';
        });

        // Save
        function saveImage() {
            const originalTransform = viewport.style.transform;
            viewport.style.transform = 'none'; 
            
            html2canvas(board, {
                scale: 1, width: 3840, height: 2160,
                useCORS: true, backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'CodeVein_Sheet.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                viewport.style.transform = originalTransform;
            });
        }
    </script>
</body>
</html>

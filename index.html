<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Vein Ⅱ Sheet Maker</title>
    
    <!-- FontAwesome (Icons) & html2canvas & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* --- CSS Variables --- */
        :root {
            --bg-frame: #121212;      /* 브라우저 전체 프레임 색 */
            --bg-header: #2a2a2a;     /* 주소창 및 활성 탭 색 */
            --bg-tab-inactive: #1a1a1a;
            
            --bg-workspace: #4a4645;
            --bg-sidebar: #2d2a29;
            --bg-rail: #1e1c1b;
            
            --accent-gold: #bf9739;
            --text-white: #ffffff;
            --text-sub: #aaaaaa;
            
            --tab-h: 40px;            /* 탭 높이 */
            --address-h: 50px;        /* 주소창 높이 */
            --editor-w: 320px;        /* 에디터 너비 */
        }

        /* --- Base --- */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-frame);
            color: var(--text-white);
            overflow: hidden;
            user-select: none;
        }

        /* --- 1. Browser Tabs Area --- */
        .browser-top {
            height: var(--tab-h);
            background-color: var(--bg-frame);
            display: flex;
            align-items: flex-end;
            padding: 0 10px;
            gap: 6px;
            -webkit-app-region: drag; /* 데스크탑 앱 느낌 */
        }

        .tab {
            height: 32px;
            padding: 0 20px;
            background-color: var(--bg-tab-inactive);
            color: #888;
            border-radius: 10px 10px 0 0;
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .tab:hover {
            background-color: #333;
            color: #ccc;
        }

        .tab.active {
            height: 36px; /* 활성 탭이 더 큼 */
            background-color: var(--bg-header);
            color: var(--text-white);
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.2);
        }

        .tab-plus {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            color: #888; cursor: pointer; border-radius: 50%;
            transition: 0.2s; margin-left: 4px; margin-bottom: 2px;
        }
        .tab-plus:hover { background-color: #333; color: #fff; }

        /* --- 2. Address Bar Area --- */
        .address-bar-row {
            height: var(--address-h);
            background-color: var(--bg-header);
            border-bottom: 1px solid #000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            position: relative;
            z-index: 9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .nav-controls {
            display: flex; gap: 15px; color: #888; font-size: 14px;
        }
        .nav-btn { cursor: pointer; transition: 0.2s; }
        .nav-btn:hover { color: #fff; }

        .address-input {
            flex: 1;
            height: 32px;
            background-color: #1a1a1a;
            border: 1px solid #444;
            border-radius: 16px; /* 둥근 주소창 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ddd;
            font-size: 14px;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 0.5px;
            user-select: text;
        }
        
        .address-input i { margin-right: 8px; color: #666; font-size: 12px; }

        .right-controls {
            display: flex; align-items: center; gap: 16px;
        }

        .author-id { font-size: 14px; color: #888; font-weight: 500; }
        
        .icon-btn {
            width: 30px; height: 30px;
            background: #333; border: 1px solid #555; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            color: #ccc; text-decoration: none; cursor: pointer;
            transition: all 0.2s;
        }
        .icon-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); background: #444; }

        /* --- 3. Main Layout --- */
        .main-wrapper {
            display: flex;
            height: calc(100vh - var(--tab-h) - var(--address-h));
            width: 100vw;
            position: relative;
        }

        /* Sidebar Container */
        .sidebar-container {
            display: flex;
            background: var(--bg-sidebar);
            border-right: 1px solid #000;
            position: relative;
            z-index: 20;
        }

        /* Fixed Rail */
        .tab-rail {
            width: 60px; min-width: 60px;
            background: var(--bg-rail);
            border-right: 1px solid #333;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 15px; gap: 15px;
            z-index: 22;
        }
        .tab-icon {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            color: #666; cursor: pointer; border-radius: 6px;
            font-size: 18px; transition: 0.2s;
        }
        .tab-icon.active, .tab-icon:hover { color: var(--accent-gold); background: rgba(255,255,255,0.08); }

        /* Collapsible Editor */
        .editor-panel {
            width: var(--editor-w);
            background: var(--bg-sidebar);
            display: flex; flex-direction: column;
            overflow: hidden;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        /* Collapsed State */
        .sidebar-container.collapsed .editor-panel { width: 0px; }

        .editor-content {
            flex: 1; padding: 20px; width: var(--editor-w); box-sizing: border-box; overflow-y: auto;
        }

        /* Toggle Button */
        .toggle-btn {
            position: absolute;
            right: -20px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 50px;
            background: #222; border: 1px solid #000; border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent-gold); z-index: 25;
            font-size: 10px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
        }

        /* Inputs */
        .section-title { font-size: 16px; font-weight: 700; color: var(--accent-gold); border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        .input-label { display: block; margin-bottom: 8px; font-size: 12px; color: #aaa; }
        input[type="text"], textarea { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }
        input[type="file"] { width: 100%; padding: 10px; background: #1a1a1a; border: 1px dashed #555; color: #888; font-size: 12px; cursor: pointer; box-sizing: border-box; }

        /* Save Button Area */
        .sidebar-footer {
            padding: 20px; border-top: 1px solid #333; width: var(--editor-w); box-sizing: border-box;
        }
        .save-btn {
            width: 100%; height: 40px;
            background-color: var(--accent-gold); color: #111;
            border: none; border-radius: 4px;
            font-weight: bold; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.2s;
        }
        .save-btn:hover { background-color: #d4a845; }

        /* --- 4. Workspace --- */
        .workspace {
            flex: 1; background-color: var(--bg-workspace);
            position: relative; overflow: hidden; cursor: grab;
            display: flex; align-items: center; justify-content: center;
        }
        .workspace:active { cursor: grabbing; }
        #viewport { transform-origin: center center; transition: transform 0.1s ease-out; will-change: transform; }

        /* Preview Board */
        .preview-box {
            width: 3840px; height: 2160px; background-color: #ffffff;
            position: relative; display: flex; align-items: center; justify-content: center;
            border-radius: 30px; overflow: hidden;
            border: 0.7px solid var(--accent-gold);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.25);
        }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .placeholder-text { font-size: 80px; font-weight: 700; color: #ddd; pointer-events: none; }

        /* --- 5. Helper Box (Minimizable) --- */
        .helper-box {
            position: absolute; bottom: 30px; right: 30px;
            background-color: rgba(30, 30, 30, 0.7); /* Opacity 70% */
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            color: #eee; font-size: 13px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            cursor: pointer;
            z-index: 50;
        }

        /* Expanded State */
        .helper-box:not(.minimized) {
            height: 60px;
            display: flex; align-items: center;
            padding: 0 30px; gap: 20px;
        }

        /* Minimized State */
        .helper-box.minimized {
            width: 50px; height: 50px;
            padding: 0;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }

        .helper-content { display: flex; align-items: center; gap: 20px; white-space: nowrap; }
        .helper-item { display: flex; align-items: center; gap: 8px; }
        .helper-item i { color: var(--accent-gold); font-size: 14px; }
        .divider { width: 1px; height: 16px; background: rgba(255,255,255,0.2); }
        .helper-strong { font-weight: 700; color: #fff; margin-right: 5px; }
        
        /* Minimized Icon */
        .minimized-icon { display: none; font-size: 20px; color: var(--accent-gold); }
        .helper-box.minimized .helper-content { display: none; }
        .helper-box.minimized .minimized-icon { display: block; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Toggle Button for Helper (inside box) */
        .helper-toggle {
            position: absolute; top: 5px; right: 10px; font-size: 10px; color: #888;
            display: none; /* Hidden by default, box click handles it */
        }
    </style>
</head>
<body>

    <!-- 1. Browser Tabs -->
    <div class="browser-top">
        <div class="tab">Code Vein</div>
        <div class="tab active">Code Vein Ⅱ</div>
        <div class="tab">TBA</div>
        <div class="tab-plus"><i class="fa-solid fa-plus"></i></div>
    </div>

    <!-- 2. Address Bar (New Header) -->
    <div class="address-bar-row">
        <div class="nav-controls">
            <i class="fa-solid fa-arrow-left nav-btn"></i>
            <i class="fa-solid fa-arrow-right nav-btn"></i>
            <i class="fa-solid fa-rotate-right nav-btn"></i>
        </div>

        <div class="address-input">
            <i class="fa-solid fa-lock"></i> https://codevein.sheet/2/main
        </div>

        <div class="right-controls">
            <span class="author-id">Made by @D3LTA_CV</span>
            <a href="https://x.com/D3LTA_CV" target="_blank" class="icon-btn" title="Twitter">
                <i class="fa-brands fa-x-twitter"></i>
            </a>
            <div class="icon-btn" title="Help" onclick="alert('화면 우측 하단을 보세요.')">
                <i class="fa-solid fa-question"></i>
            </div>
        </div>
    </div>

    <!-- 3. Main Content -->
    <div class="main-wrapper">
        
        <!-- Sidebar -->
        <aside class="sidebar-container" id="sidebar">
            
            <!-- Fixed Rail -->
            <div class="tab-rail">
                <div class="tab-icon active"><i class="fa-solid fa-pen-to-square"></i></div>
                <div class="tab-icon"><i class="fa-solid fa-palette"></i></div>
                <div class="tab-icon"><i class="fa-solid fa-font"></i></div>
            </div>

            <!-- Collapsible Panel -->
            <div class="editor-panel">
                <div class="editor-content">
                    <div class="section-title">기본 설정</div>
                    <div class="input-group">
                        <label class="input-label">배경 이미지 (4K 권장)</label>
                        <input type="file" id="imgInput" accept="image/*">
                    </div>
                    <div class="input-group">
                        <label class="input-label">캐릭터 이름</label>
                        <input type="text" placeholder="이름을 입력하세요">
                    </div>
                    <div class="input-group">
                        <label class="input-label">메모 / 설정</label>
                        <textarea rows="6" placeholder="내용을 입력하세요..."></textarea>
                    </div>
                </div>
                
                <div class="sidebar-footer">
                    <button class="save-btn" onclick="saveImage()">
                        <i class="fa-solid fa-download"></i> PNG로 저장
                    </button>
                </div>
            </div>

            <!-- Sidebar Toggle -->
            <div class="toggle-btn" id="toggleBtn" title="Toggle Panel">
                <i class="fa-solid fa-chevron-left" id="toggleIcon"></i>
            </div>
        </aside>

        <!-- Workspace -->
        <section class="workspace" id="workspace">
            <div id="viewport">
                <div class="preview-box" id="board">
                    <span class="placeholder-text">PREVIEW AREA</span>
                    <img id="preview-img" src="" alt="">
                </div>
            </div>

            <!-- Helper Box (Click to Minimize/Expand) -->
            <div class="helper-box" id="helperBox" title="클릭하여 최소화/확대">
                <i class="fa-solid fa-info-circle minimized-icon"></i>
                
                <div class="helper-content">
                    <div class="helper-item">
                        <i class="fa-solid fa-computer-mouse"></i>
                        <span class="helper-strong">조작법</span>
                    </div>
                    <div class="divider"></div>
                    <div class="helper-item">
                        <i class="fa-solid fa-hand-pointer"></i> <span>드래그: 이동</span>
                    </div>
                    <div class="helper-item">
                        <i class="fa-solid fa-magnifying-glass"></i> <span>휠: 확대/축소</span>
                    </div>
                    <div class="helper-item">
                        <i class="fa-solid fa-arrow-rotate-left"></i> <span>휠 클릭: 초기화</span>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // --- Elements ---
        const workspace = document.getElementById('workspace');
        const viewport = document.getElementById('viewport');
        const board = document.getElementById('board');
        const imgInput = document.getElementById('imgInput');
        const previewImg = document.getElementById('preview-img');
        const placeholder = document.querySelector('.placeholder-text');
        
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggleBtn');
        const toggleIcon = document.getElementById('toggleIcon');
        
        const helperBox = document.getElementById('helperBox');

        // --- Sidebar Toggle ---
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                toggleIcon.className = 'fa-solid fa-chevron-right';
            } else {
                toggleIcon.className = 'fa-solid fa-chevron-left';
            }
        });

        // --- Helper Box Toggle ---
        helperBox.addEventListener('click', () => {
            helperBox.classList.toggle('minimized');
        });

        // --- Viewport Logic ---
        const INITIAL_SCALE = 0.15; 
        let scale = INITIAL_SCALE;
        let isDragging = false;
        let startX, startY, pointX = 0, pointY = 0;

        function updateTransform() {
            viewport.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        }
        updateTransform();

        // Image Upload
        imgInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImg.src = event.target.result;
                    previewImg.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // Zoom
        workspace.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            scale = Math.min(Math.max(0.05, scale + delta), 3);
            updateTransform();
        }, { passive: false });

        // Pan & Reset
        workspace.addEventListener('mousedown', (e) => {
            if (e.button === 1) { // Middle Click
                e.preventDefault();
                scale = INITIAL_SCALE;
                pointX = 0; pointY = 0;
                updateTransform();
                return;
            }
            if (e.button === 0) { // Left Click
                isDragging = true;
                startX = e.clientX - pointX;
                startY = e.clientY - pointY;
                workspace.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            pointX = e.clientX - startX;
            pointY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            workspace.style.cursor = 'grab';
        });

        // Save to PNG
        function saveImage() {
            const originalTransform = viewport.style.transform;
            viewport.style.transform = 'none'; 
            
            html2canvas(board, {
                scale: 1, width: 3840, height: 2160,
                useCORS: true, backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'CodeVein_Sheet.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                viewport.style.transform = originalTransform;
            });
        }
    </script>
</body>
</html>

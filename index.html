<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Vein Ⅱ Sheet Maker</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            /* Theme Colors */
            --accent-gold: #D3AF37;
            --accent-red: #ea0000;
            --current-accent: var(--accent-gold);
            
            /* UI Colors */
            --bg-frame: #121212;
            --bg-header: #2a2a2a;
            --bg-workspace: #4a4645;
            --bg-sidebar: #2d2a29;
            --bg-rail: #1e1c1b;
            --text-white: #ffffff;
            --text-sub: #aaaaaa;

            /* Dimensions */
            --tab-h: 45px;
            --address-h: 55px;
            --sidebar-w: 400px;
            --rail-w: 50px;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-frame);
            color: var(--text-white);
            overflow: hidden;
            user-select: none;
        }

        /* --- Header: Tabs & Window Controls --- */
        .browser-header {
            background-color: var(--bg-frame);
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            height: var(--tab-h);
            display: flex;
            align-items: flex-end;
            padding-left: 10px;
            position: relative;
        }

        .tabs {
            display: flex;
            gap: 5px;
            align-items: flex-end;
        }

        .tab {
            height: 38px;
            padding: 0 20px;
            background: #1a1a1a;
            border-radius: 10px 10px 0 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 700;
            color: #888;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .tab:not(.active):hover {
            transform: translateY(-3px) scale(1.05);
            color: #ccc;
        }

        .tab.active {
            background: var(--bg-header);
            color: var(--text-white);
            height: 42px;
            z-index: 2;
        }

        .tab img {
            width: 20px; height: 20px;
            border-radius: 4px;
            object-fit: cover;
        }

        .tab-plus {
            padding: 10px;
            color: #666;
            cursor: pointer;
            font-size: 18px;
        }

        .window-controls {
            position: absolute; right: 0; top: 0;
            display: flex;
        }

        .win-btn {
            width: 45px; height: 35px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; cursor: pointer;
        }

        .win-btn:hover { background: #333; }
        .win-btn.close:hover { background: #ea0000; color: white; }

        /* --- Address Bar --- */
        .address-bar-row {
            height: var(--address-h);
            background: var(--bg-header);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 5;
        }

        .nav-btns { display: flex; gap: 10px; color: #888; }
        .nav-btn { cursor: pointer; transition: 0.2s; }
        .nav-btn:hover { color: var(--text-white); }

        .address-input {
            flex-grow: 1;
            background: #1a1a1a;
            height: 32px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #ccc;
        }

        .right-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .author { font-size: 13px; color: #888; }

        .sq-btn {
            width: 32px; height: 32px;
            background: #333;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #ccc; text-decoration: none;
        }

        .sq-btn:hover { border: 1px solid var(--current-accent); color: var(--current-accent); }

        /* --- Main Layout --- */
        .main-container {
            display: flex;
            height: calc(100vh - 100px);
        }

        /* Sidebar */
        .sidebar {
            display: flex;
            background: var(--bg-sidebar);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: var(--sidebar-w);
            position: relative;
        }

        .sidebar.collapsed { width: var(--rail-w); }

        .sidebar-rail {
            width: var(--rail-w);
            background: var(--bg-rail);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 20px;
            z-index: 10;
        }

        .rail-item { font-size: 20px; color: #555; cursor: pointer; transition: 0.2s; }
        .rail-item.active, .rail-item:hover { color: var(--current-accent); }

        .editor-content {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            min-width: 350px;
        }

        .sidebar.collapsed .editor-content { display: none; }

        .toggle-handle {
            position: absolute; right: -12px; top: 50%;
            width: 24px; height: 48px; background: #222;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 20; color: var(--current-accent); border: 1px solid #000;
        }

        /* --- Workspace & Preview --- */
        .workspace {
            flex-grow: 1;
            background: var(--bg-workspace);
            position: relative;
            overflow: hidden;
            cursor: grab;
        }

        .workspace:active { cursor: grabbing; }

        #viewport {
            transform-origin: center center;
            transition: transform 0.1s ease-out;
        }

        .preview-box {
            width: 3840px; height: 2160px;
            background: #ffffff;
            border-radius: 30px;
            border: 0.7px solid #bf9739;
            box-shadow: 0 0 15px rgba(0,0,0,0.25);
            position: relative;
            overflow: hidden;
        }

        /* Helper Box */
        .helper-box {
            position: absolute; bottom: 25px; right: 25px;
            height: 60px; background: rgba(0,0,0,0.7);
            border-radius: 30px; display: flex; align-items: center;
            padding: 0 25px; gap: 15px; color: #eee; font-size: 13px;
            transition: 0.3s; cursor: pointer;
        }

        .helper-box.minimized { width: 60px; padding: 0; justify-content: center; }

        /* Form Components */
        .group { margin-bottom: 25px; }
        label { display: block; font-size: 12px; color: var(--current-accent); margin-bottom: 8px; font-weight: bold; }
        input[type="text"], select {
            width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 4px;
        }

        .grid-wrap {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px; margin-top: 10px;
        }

        .img-option {
            text-align: center; cursor: pointer; border: 1px solid transparent; padding: 5px; border-radius: 4px;
        }
        .img-option:hover, .img-option.selected { border-color: var(--current-accent); background: rgba(211, 175, 55, 0.1); }
        .img-option img { width: 50px; height: 50px; object-fit: contain; display: block; margin: 0 auto 5px; }
        .img-option span { font-size: 10px; color: #ccc; }

        .save-btn {
            width: 100%; height: 45px; background: var(--current-accent);
            border: none; border-radius: 4px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px;
        }
    </style>
</head>
<body>

    <header class="browser-header">
        <div class="top-bar">
            <div class="tabs">
                <div class="tab">
                    <img src="Icons/Titles/CV1.png" alt="CV1"> CODE VEIN
                </div>
                <div class="tab active">
                    <img src="Icons/Titles/CV2.png" alt="CV2"> CODE VEIN Ⅱ
                </div>
                <div class="tab" id="easterEggTab">TBA</div>
            </div>
            <div class="tab-plus"><i class="fa-solid fa-plus"></i></div>
            
            <div class="window-controls">
                <div class="win-btn"><i class="fa-solid fa-minus"></i></div>
                <div class="win-btn"><i class="fa-regular fa-square"></i></div>
                <div class="win-btn close"><i class="fa-solid fa-xmark"></i></div>
            </div>
        </div>

        <div class="address-bar-row">
            <div class="nav-btns">
                <i class="fa-solid fa-arrow-left nav-btn"></i>
                <i class="fa-solid fa-arrow-right nav-btn"></i>
                <i class="fa-solid fa-rotate-right nav-btn" onclick="location.reload()"></i>
            </div>
            <div class="address-input">
                https://codevein.sheet/2/main
            </div>
            <div class="right-meta">
                <span class="author">Made by @D3LTA_CV</span>
                <a href="https://x.com/D3LTA_CV" target="_blank" class="sq-btn"><i class="fa-brands fa-x-twitter"></i></a>
                <div class="sq-btn" onclick="alert('화면 우측 하단의 설명을 확인하세요!')">?</div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-rail">
                <i class="fa-solid fa-user-gear rail-item active"></i>
                <i class="fa-solid fa-palette rail-item"></i>
                <i class="fa-solid fa-font rail-item"></i>
            </div>
            
            <div class="editor-content">
                <div class="group">
                    <label>NICKNAME</label>
                    <input type="text" id="in-nick" placeholder="닉네임을 입력하세요" oninput="sync()">
                </div>

                <div class="group">
                    <label>TWEET TENDENCY (다수 선택 가능)</label>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px; font-size: 11px;">
                        <label style="color:#aaa;"><input type="checkbox"> RT</label>
                        <label style="color:#aaa;"><input type="checkbox"> 마음</label>
                        <label style="color:#aaa;"><input type="checkbox"> 인용</label>
                        <label style="color:#aaa;"><input type="checkbox"> 스크린샷</label>
                        <label style="color:#aaa;"><input type="checkbox"> 그림</label>
                        <label style="color:#aaa;"><input type="checkbox"> 일상</label>
                    </div>
                </div>

                <div class="group">
                    <label>BUDDY STYLE (하나 선택)</label>
                    <div class="grid-wrap">
                        <div class="img-option" onclick="selectSingle(this, 'buddy-style')">
                            <img src="Icons/Buddy Style/빙의.png" alt="빙의"><span>빙의</span>
                        </div>
                        <div class="img-option" onclick="selectSingle(this, 'buddy-style')">
                            <img src="Icons/Buddy Style/소환.png" alt="소환"><span>소환</span>
                        </div>
                    </div>
                </div>

                <div class="group">
                    <label>BUDDY (최대 3명)</label>
                    <div class="grid-wrap">
                        <div class="img-option" onclick="selectMulti(this, 'buddy', 3)">
                            <img src="Icons/Buddy Icons/이리스.png" alt="이리스"><span>이리스</span>
                        </div>
                        <div class="img-option" onclick="selectMulti(this, 'buddy', 3)">
                            <img src="Icons/Buddy Icons/야드비가.png" alt="야드비가"><span>야드비가</span>
                        </div>
                        <div class="img-option" onclick="selectMulti(this, 'buddy', 3)">
                            <img src="Icons/Buddy Icons/조제.png" alt="조제"><span>조제</span>
                        </div>
                    </div>
                </div>

                <div class="group">
                    <label>PROGRESSION (택 1)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="in-ending" placeholder="엔딩 횟수" style="width:50%;">
                        <input type="text" id="in-ng" placeholder="New Game+" style="width:50%;">
                    </div>
                </div>

                <button class="save-btn" onclick="save()">
                    <i class="fa-solid fa-download"></i> PNG로 저장
                </button>
            </div>

            <div class="toggle-handle" onclick="toggleSidebar()">
                <i class="fa-solid fa-chevron-left" id="toggleIcon"></i>
            </div>
        </aside>

        <section class="workspace" id="workspace">
            <div id="viewport">
                <div class="preview-box" id="capture-area">
                    <div id="out-nick" style="position:absolute; top:120px; left:120px; font-size:120px; font-weight:bold; color:#000;"></div>
                </div>
            </div>

            <div class="helper-box" id="helper" onclick="toggleHelper()">
                <i class="fa-solid fa-mouse"></i>
                <div id="helper-text">
                    <b>좌클릭 드래그</b> 이동 | <b>스크롤</b> 확대·축소 | <b>휠 클릭</b> 중앙 정렬
                </div>
            </div>
        </section>
    </div>

    <script>
        /* --- Easter Egg Logic --- */
        let clicks = 0;
        const eggTab = document.getElementById('easterEggTab');
        eggTab.addEventListener('click', () => {
            clicks++;
            if (clicks === 7) {
                document.documentElement.style.setProperty('--current-accent', '#ea0000');
                eggTab.style.color = '#ea0000';
                console.log("Easter Egg Activated: Blood Mode");
            }
        });

        /* --- Sidebar Logic --- */
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const icon = document.getElementById('toggleIcon');
            sb.classList.toggle('collapsed');
            icon.className = sb.classList.contains('collapsed') ? 'fa-solid fa-chevron-right' : 'fa-solid fa-chevron-left';
        }

        /* --- Helper Box Logic --- */
        function toggleHelper() {
            const h = document.getElementById('helper');
            const t = document.getElementById('helper-text');
            h.classList.toggle('minimized');
            t.style.display = h.classList.contains('minimized') ? 'none' : 'block';
        }

        /* --- Selection Logic --- */
        function selectSingle(el, group) {
            el.parentElement.querySelectorAll('.img-option').forEach(item => item.classList.remove('selected'));
            el.classList.add('selected');
            sync();
        }

        function selectMulti(el, group, max) {
            const selected = el.parentElement.querySelectorAll('.selected');
            if (!el.classList.contains('selected') && selected.length >= max) return;
            el.classList.toggle('selected');
            sync();
        }

        /* --- Real-time Sync --- */
        function sync() {
            const nick = document.getElementById('in-nick').value;
            document.getElementById('out-nick').innerText = nick;
        }

        /* --- Zoom & Pan Logic --- */
        const ws = document.getElementById('workspace');
        const vp = document.getElementById('viewport');
        let scale = 0.15, posX = 0, posY = 0;

        function updateXform() { vp.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
        updateXform();

        ws.addEventListener('wheel', e => {
            e.preventDefault();
            scale += e.deltaY * -0.0005;
            scale = Math.min(Math.max(0.05, scale), 2);
            updateXform();
        });

        let dragging = false, startX, startY;
        ws.addEventListener('mousedown', e => {
            if (e.button === 1) { scale = 0.15; posX = 0; posY = 0; updateXform(); return; }
            dragging = true;
            startX = e.clientX - posX;
            startY = e.clientY - posY;
        });

        window.addEventListener('mousemove', e => {
            if (!dragging) return;
            posX = e.clientX - startX;
            posY = e.clientY - startY;
            updateXform();
        });
        window.addEventListener('mouseup', () => dragging = false);

        /* --- Save Function --- */
        function save() {
            const area = document.getElementById('capture-area');
            html2canvas(area, { scale: 1 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'CodeVein2_Sheet.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>

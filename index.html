<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Vein Ⅱ Sheet Maker</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --accent-gold: #D3AF37;
            --accent-border: #bf9739;
            --accent-blood: #ea0000;
    /* 변수 자체가 바뀔 때 1초 동안 부드럽게 변하도록 설정 */
    transition: --current-accent 1s ease; 
}

/* 2. 악센트 컬러를 사용하는 주요 요소들에 transition 적용 */
/* 이 요소들이 이스터에그 발동 시 색상이 서서히 변하게 됩니다. */
.section-title, 
.save-btn, 
.tab-icon-btn, 
.toggle-btn, 
.check-item, 
.img-option.selected {
    transition: color 1s ease, background-color 1s ease, border-color 1s ease;
}

/* 3. 주소창 자물쇠와 TBA 탭 전용 설정 */
#addrLock, #eggTab {
    transition: color 1s ease; /* 색상 변화를 1초 동안 부드럽게 */
}

/* 4. 미활성화 탭 호버 효과 (기존 코드 유지 및 scale 추가) */
.tab:not(.active):hover {
    background-color: #333;
    color: #ccc;
    transform: scale(1.05);
    transform-origin: bottom;
    transition: 0.2s; /* 호버는 빠르게 반응하도록 별도 설정 */
}

            --bg-frame: #121212;
            --bg-header: #2a2a2a;
            --bg-tab-inactive: #1a1a1a;
            --bg-workspace: #4a4645;
            --bg-sidebar: #2d2a29;
            --bg-rail: #1e1c1b;
            
            --text-white: #ffffff;
            --text-sub: #aaaaaa;

            --tab-h: 42px;
            --address-h: 50px;
            --editor-w: 350px;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-frame);
            color: var(--text-white);
            overflow: hidden;
            user-select: none;
        }

        /* --- Window Controls --- */
        .window-controls {
            position: absolute; top: 0; right: 0;
            height: var(--tab-h);
            display: flex; z-index: 200;
        }
        .win-btn {
            width: 46px; height: 100%;
            display: flex; align-items: center; justify-content: center;
            color: #888; font-size: 12px; cursor: pointer; transition: 0.2s;
        }
        .win-btn:hover { background-color: #333; color: #fff; }
        .win-btn.close:hover { background-color: #e81123; color: #fff; }

        /* --- Header / Tabs --- */
        .browser-top {
            height: var(--tab-h);
            background-color: var(--bg-frame);
            display: flex; align-items: flex-end;
            padding-left: 10px; gap: 6px;
            padding-right: 140px;
        }
        .tab {
            height: 32px; padding: 0 20px;
            background-color: var(--bg-tab-inactive);
            color: #888;
            border-radius: 10px 10px 0 0;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 12px; font-weight: 700; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s ease;
        }
        .tab:not(.active):hover { background-color: #333; color: #ccc; transform: scale(1.05); transform-origin: bottom; }
        .tab.active {
            height: 36px; background-color: var(--bg-header);
            color: var(--text-white); z-index: 10;
        }
        .tab-icon { width: 18px; height: 18px; object-fit: cover; border-radius: 4px; }
        .tab-plus {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            color: #888; cursor: pointer; border-radius: 50%; transition: 0.2s; margin-bottom: 2px;
        }
        .tab-plus:hover { background-color: #333; color: #fff; }

        /* --- Address Bar --- */
        .address-bar-row {
            height: var(--address-h);
            background-color: var(--bg-header);
            border-bottom: 1px solid #000;
            display: flex; align-items: center;
            padding: 0 20px; gap: 16px;
            position: relative; z-index: 9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .nav-controls { display: flex; gap: 8px; color: #888; }
        .nav-btn { cursor: pointer; transition: 0.2s; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .nav-btn:hover { background-color: #444; color: #fff; }

        .address-input {
            flex: 1; height: 32px; background-color: #1a1a1a; border: 1px solid #444;
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            color: #ddd; font-size: 14px; font-family: 'Segoe UI', sans-serif;
        }

        .right-controls { display: flex; align-items: center; gap: 12px; }
        .author-id { font-size: 14px; color: #888; font-weight: 500; }
        .icon-btn {
            width: 32px; height: 32px; background: #333; border: 1px solid #555; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; color: #ccc; text-decoration: none; transition: 0.2s;
        }
        .icon-btn:hover { border-color: var(--current-accent); color: var(--current-accent); }

        /* --- Layout --- */
        .main-wrapper { display: flex; height: calc(100vh - var(--tab-h) - var(--address-h)); width: 100vw; position: relative; }

        /* Sidebar */
        .sidebar-container { display: flex; background: var(--bg-sidebar); border-right: 1px solid #000; z-index: 20; position: relative; }
        .tab-rail {
            width: 60px; background: var(--bg-rail); border-right: 1px solid #333;
            display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 15px;
        }
        .tab-icon-btn {
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            color: #666; cursor: pointer; border-radius: 8px; font-size: 18px; transition: 0.2s;
        }
        .tab-icon-btn.active { color: var(--current-accent); background: rgba(255,255,255,0.08); }

        .editor-panel { width: var(--editor-w); background: var(--bg-sidebar); display: flex; flex-direction: column; overflow: hidden; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-container.collapsed .editor-panel { width: 0px; }

        .editor-content { flex: 1; padding: 20px; width: var(--editor-w); box-sizing: border-box; overflow-y: auto; }
        .toggle-btn {
            position: absolute; right: -20px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 50px; background: #222; border: 1px solid #000; border-radius: 0 8px 8px 0;
            cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--current-accent); z-index: 25;
        }

        /* --- Form Elements --- */
        .section-title { font-size: 14px; font-weight: 700; color: var(--current-accent); border-bottom: 1px solid #444; padding-bottom: 8px; margin-bottom: 15px; margin-top: 10px; }
        .input-group { margin-bottom: 15px; }
        .input-label { display: block; margin-bottom: 5px; font-size: 11px; color: #aaa; }
        input[type="text"], select { width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }
        
        .grid-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .check-item { font-size: 11px; background: #222; padding: 5px; border-radius: 3px; cursor: pointer; text-align: center; border: 1px solid transparent; }
        .check-item.selected { border-color: var(--current-accent); color: var(--current-accent); }

        .image-select-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; }
        .img-option { cursor: pointer; text-align: center; font-size: 10px; opacity: 0.6; transition: 0.2s; }
        .img-option.selected { opacity: 1; color: var(--current-accent); font-weight: bold; }
        .img-option img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; display: block; margin: 0 auto 4px; border: 1px solid transparent; }
        .img-option.selected img { border-color: var(--current-accent); }

        .sidebar-footer { padding: 15px; border-top: 1px solid #333; }
        .save-btn { width: 100%; height: 40px; background-color: var(--current-accent); color: #111; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* --- Workspace --- */
        .workspace { flex: 1; background-color: var(--bg-workspace); position: relative; overflow: hidden; cursor: grab; display: flex; align-items: center; justify-content: center; }
        #viewport { transform-origin: center center; will-change: transform; }
        .preview-box {
            width: 3840px; height: 2160px; background-color: #ffffff;
            position: relative; border-radius: 30px; overflow: hidden;
            border: 0.7px solid var(--accent-border);
            box-shadow: 0 0 15px 5px rgba(0,0,0,0.25);
        }

        /* --- Helper Box (수정본) --- */
.helper-box {
    position: absolute;
    bottom: 30px;
    right: 30px;
    height: 60px; /* 높이 고정 */
    background-color: rgba(30, 30, 30, 0.7);
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 30px; /* 기본 둥근 사각형 */
    color: #eee;
    font-size: 13px;
    display: flex;
    align-items: center;
    padding: 0 25px;
    gap: 15px;
    cursor: pointer;
    z-index: 50;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    overflow: hidden;
}

/* 최소화(닫혔을 때) 시 정원형 유지 */
.helper-box.minimized {
    width: 60px;   /* 높이와 동일하게 설정하여 정원형 유지 */
    padding: 0;    /* 내부 여백 제거 */
    justify-content: center; /* 아이콘 중앙 배치 */
    border-radius: 50%; /* 완벽한 원형 */
}

.helper-icon-min {
    display: none;
    font-size: 20px;
    color: var(--current-accent);
}

.helper-box.minimized .helper-content {
    display: none;
}

.helper-box.minimized .helper-icon-min {
    display: block;
}

        /* --- Text Rendering --- */
        .render-layer { position: absolute; color: #000; pointer-events: none; }
        #render-nickname { top: 100px; left: 100px; font-size: 100px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="window-controls">
        <div class="win-btn"><i class="fa-solid fa-minus"></i></div>
        <div class="win-btn"><i class="fa-regular fa-square"></i></div>
        <div class="win-btn close"><i class="fa-solid fa-xmark"></i></div>
    </div>

    <div class="browser-top">
        <div class="tab">
            <img src="Icons/Titles/CV1.png" class="tab-icon" alt=""> CODE VEIN
        </div>
        <div class="tab active">
            <img src="Icons/Titles/CV2.png" class="tab-icon" alt=""> CODE VEIN Ⅱ
        </div>
        <div class="tab" id="eggTab">TBA</div>
        <div class="tab-plus"><i class="fa-solid fa-plus"></i></div>
    </div>

    <div class="address-bar-row">
    <div class="nav-controls">
        <div class="nav-btn"><i class="fa-solid fa-arrow-left"></i></div>
        <div class="nav-btn"><i class="fa-solid fa-arrow-right"></i></div>
        <div class="nav-btn" onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i></div>
    </div>

    <div class="address-input" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
        <i class="fa-solid fa-lock" id="addrLock" style="font-size: 12px; color: var(--current-accent); transition: color 0.3s ease; margin-top: 1px;"></i>
        <span style="font-size: 14px; letter-spacing: 0.5px; color: #ddd;">https://codevein.sheet/2/main</span>
    </div>

    <div class="right-controls">
        <span class="author-id">Made by @D3LTA_CV</span>
        <a href="https://x.com/D3LTA_CV" target="_blank" class="icon-btn" title="Twitter">
            <i class="fa-brands fa-x-twitter"></i>
        </a>
        <div class="icon-btn" title="Help" onclick="alert('화면 우측 하단을 확인하세요.')">
            <i class="fa-solid fa-question"></i>
        </div>
    </div>
</div>

    <div class="main-wrapper">
        <aside class="sidebar-container" id="sidebar">
            <div class="tab-rail">
                <div class="tab-icon-btn active"><i class="fa-solid fa-pen-to-square"></i></div>
                <div class="tab-icon-btn"><i class="fa-solid fa-palette"></i></div>
                <div class="tab-icon-btn"><i class="fa-solid fa-font"></i></div>
            </div>
            
            <div class="editor-panel">
                <div class="editor-content">
                    <div class="section-title">기본 정보</div>
                    <div class="input-group">
                        <label class="input-label">닉네임</label>
                        <input type="text" id="inNick" placeholder="닉네임을 입력하세요">
                    </div>

                    <div class="section-title">트윗 성향 (다수 선택)</div>
                    <div class="grid-options" id="tweetType">
                        <div class="check-item">RT</div><div class="check-item">마음</div><div class="check-item">인용</div>
                        <div class="check-item">탐라대화</div><div class="check-item">일상</div><div class="check-item">욕트</div>
                        <div class="check-item">썰</div><div class="check-item">글</div><div class="check-item">디자인</div>
                        <div class="check-item">그림</div><div class="check-item">영상</div><div class="check-item">스크린샷</div>
                    </div>

                    <div class="section-title">플레이 성향 / 버디</div>
                    <div class="input-group">
                        <label class="input-label">버디 스타일 (택 1)</label>
                        <div class="image-select-grid" id="buddyStyle">
                            <div class="img-option" data-val="빙의"><img src="Icons/Buddy Style/빙의.png">빙의</div>
                            <div class="img-option" data-val="소환"><img src="Icons/Buddy Style/소환.png">소환</div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">New Game+ / 엔딩 횟수</label>
                        <input type="text" id="inCount" placeholder="횟수 입력">
                    </div>

                    <div class="input-group">
                        <label class="input-label">자캐 설정</label>
                        <select id="inOC">
                            <option value="있음">있음</option>
                            <option value="없음">없음</option>
                        </select>
                    </div>
                </div>
                <div class="sidebar-footer">
                    <button class="save-btn" onclick="saveImage()">
                        <i class="fa-solid fa-download"></i> PNG로 저장
                    </button>
                </div>
            </div>
            <div class="toggle-btn" id="toggleBtn"><i class="fa-solid fa-chevron-left"></i></div>
        </aside>

        <section class="workspace" id="workspace">
            <div id="viewport">
                <div class="preview-box" id="board">
                    <div id="render-nickname" class="render-layer"></div>
                    </div>
            </div>

            <div class="helper-box" id="helperBox" title="클릭하여 최소화/확대">
    <i class="fa-solid fa-circle-info helper-icon-min"></i>
    
    <div class="helper-content" style="display: flex; align-items: center; gap: 20px; white-space: nowrap;">
        <div class="helper-item" style="display: flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-hand-back-fist" style="color: var(--current-accent); font-size: 14px;"></i>
            <span>드래그: <span style="font-weight: 700; color: #fff;">이동</span></span>
        </div>

        <div style="width: 1px; height: 16px; background: rgba(255,255,255,0.2);"></div>

        <div class="helper-item" style="display: flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-mouse" style="color: var(--current-accent); font-size: 14px;"></i>
            <span>휠: <span style="font-weight: 700; color: #fff;">확대/축소</span></span>
        </div>

        <div style="width: 1px; height: 16px; background: rgba(255,255,255,0.2);"></div>

        <div class="helper-item" style="display: flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-computer-mouse" style="color: var(--current-accent); font-size: 14px;"></i>
            <span>휠 클릭: <span style="font-weight: 700; color: #fff;">중앙 정렬</span></span>
        </div>
    </div>
</div>

    <script>
        // --- 1. Viewport Logic (Pan & Zoom) ---
        const workspace = document.getElementById('workspace');
        const viewport = document.getElementById('viewport');
        const INITIAL_SCALE = 0.18;
        let scale = INITIAL_SCALE, isDragging = false, startX, startY, pointX = 0, pointY = 0;

        const updateTransform = () => viewport.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        updateTransform();

        workspace.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            scale = Math.min(Math.max(0.05, scale + delta), 3);
            updateTransform();
        }, { passive: false });

        workspace.addEventListener('mousedown', e => {
            if (e.button === 1) { // Middle Click
                scale = INITIAL_SCALE; pointX = 0; pointY = 0; updateTransform();
            } else if (e.button === 0) {
                isDragging = true; startX = e.clientX - pointX; startY = e.clientY - pointY;
                workspace.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            pointX = e.clientX - startX; pointY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => { isDragging = false; workspace.style.cursor = 'grab'; });

        // --- 2. UI Interations ---
        document.getElementById('toggleBtn').addEventListener('click', function() {
            const container = document.getElementById('sidebar');
            container.classList.toggle('collapsed');
            this.querySelector('i').className = container.classList.contains('collapsed') ? 'fa-solid fa-chevron-right' : 'fa-solid fa-chevron-left';
        });

        document.getElementById('helperBox').addEventListener('click', function() { this.classList.toggle('minimized'); });

        // --- 4. Easter Egg (7 Clicks & Sequence Animation) ---
let eggCount = 0;
let isAnimating = false; // 애니메이션 중 중복 클릭 방지

const eggTab = document.getElementById('eggTab');
const addrLock = document.getElementById('addrLock');

eggTab.addEventListener('click', function() {
    if (isAnimating) return; // 시퀀스 진행 중에는 클릭 무시
    
    eggCount++;
    
    if (eggCount >= 7) {
        isAnimating = true;
        eggCount = 0; // 카운트 초기화

        // [STEP 1] BLOOD (빨간색 활성화)
        document.documentElement.style.setProperty('--current-accent', '#ea0000');
        if(addrLock) addrLock.style.color = '#ea0000';
        this.style.color = '#ea0000';
        this.innerText = "BLOOD";

        // [STEP 2] 1초 뒤 TO
        setTimeout(() => {
            this.innerText = "TO";
        }, 1000);

        // [STEP 3] 다시 1초 뒤 (총 2초 뒤) GOLD로 변경 및 색상 복구 시작
        setTimeout(() => {
            this.innerText = "GOLD";
            
            // 색상을 다시 골드(#D3AF37)로 천천히 복구 (CSS transition 영향)
            document.documentElement.style.setProperty('--current-accent', '#D3AF37');
            if(addrLock) addrLock.style.color = '#D3AF37';
            this.style.color = '#D3AF37';
        }, 2000);

        // [STEP 4] 마지막 1초 뒤 (총 3초 뒤) TBA로 복구 및 종료
        setTimeout(() => {
            this.innerText = "TBA";
            this.style.color = ''; // 기존 스타일로 복구
            isAnimating = false;
        }, 3000);
    }
});

        // --- 4. Form Actions ---
        // 다수 선택 로직 (Tweet Type)
        document.querySelectorAll('#tweetType .check-item').forEach(item => {
            item.addEventListener('click', () => item.classList.toggle('selected'));
        });

        // 단일 선택 로직 (Buddy Style)
        document.querySelectorAll('#buddyStyle .img-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('#buddyStyle .img-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
            });
        });

        // 실시간 닉네임 반영 예시
        document.getElementById('inNick').addEventListener('input', (e) => {
            document.getElementById('render-nickname').innerText = e.target.value;
        });

        // --- 5. Save Function ---
        function saveImage() {
            const board = document.getElementById('board');
            const originalTransform = viewport.style.transform;
            viewport.style.transform = 'none';
            
            html2canvas(board, {
                scale: 1, width: 3840, height: 2160, useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'CodeVein_Sheet.png';
                link.href = canvas.toDataURL();
                link.click();
                viewport.style.transform = originalTransform;
            });
        }
    </script>
</body>
</html>

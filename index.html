<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE VEIN II SHEET MAKER</title>
    <!-- 아이콘 및 스크린샷 라이브러리 -->
    <script src="https://html2canvas.hertzen.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root {
            --header-h: 80px;
            --sidebar-w: 25vw;
            --mini-tab-w: 60px;
            --accent-gold: #bf9739;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Noto Sans KR', sans-serif; background: #1a1a1a; color: #eee; overflow: hidden; }

        /* 1. Header Area */
        header {
            height: var(--header-h); background: #111; border-bottom: 1px solid #333;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 20px;
            box-sizing: border-box; z-index: 1000;
        }

        .header-center { text-align: center; grid-column: 2; }
        .title-en { font-size: 20px; font-weight: bold; text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        .title-ko { font-size: 14px; color: #888; margin-top: 2px; }

        .header-right { grid-column: 3; display: flex; align-items: center; justify-content: flex-end; gap: 16px; }
        .author-id { color: #aaa; font-size: 14px; white-space: nowrap; }
        .btn-group { display: flex; gap: 10px; }
        .icon-btn {
            width: 32px; height: 32px; background: #2a2a2a; border: 1px solid #444; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent-gold); background: #333; }
        .save-btn { padding: 10px 20px; background: #5e0000; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Layout */
        .wrapper { display: flex; height: calc(100% - var(--header-h)); }

        /* 2. Left Box (1/4 Sidebar) */
        .sidebar { width: var(--sidebar-w); display: flex; background: #222; border-right: 1px solid #000; }
        .side-tabs { width: var(--mini-tab-w); background: #151515; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; }
        .tab-icon { color: #444; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .tab-icon.active { color: var(--accent-gold); }

        .editor-area { flex: 1; padding: 25px; overflow-y: auto; }
        .field { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; color: #ff4444; font-size: 12px; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }

        /* 3. Right Box (Workspace #4a4645) */
        .workspace { flex: 1; background: #4a4645; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; cursor: grab; }
        .workspace:active { cursor: grabbing; }

        /* 4K Board Preview */
        #preview-board {
            width: 3840px; height: 2160px; min-width: 3840px; min-height: 2160px;
            background: #ffffff; border-radius: 2px; border: 0.7px solid var(--accent-gold);
            /* 15px Soften outer glow at 25% opacity */
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.25);
            display: flex; align-items: center; justify-content: center;
            transform-origin: center center; user-select: none;
        }
        #uploaded-img { width: 100%; height: 100%; object-fit: cover; display: none; pointer-events: none; }
        .placeholder { color: #ccc; font-size: 100px; font-weight: bold; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <div></div> <!-- Spacer -->
    <div class="header-center">
        <div class="title-en">CODE VEIN II SHEET MAKER</div>
        <div class="title-ko">코드 베인 II 시트 메이커</div>
    </div>
    <div class="header-right">
        <span class="author-id">Made by @D3LTA_CV</span>
        <div class="btn-group">
            <a href="https://x.com/D3LTA_CV" target="_blank" class="icon-btn"><i class="fa-brands fa-x-twitter"></i></a>
            <div class="icon-btn" onclick="alert('Wheel: Zoom / Drag BG: Move')"><i class="fa-solid fa-question"></i></div>
        </div>
        <button class="save-btn" onclick="saveImage()">PNG로 저장</button>
    </div>
</header>

<div class="wrapper">
    <div class="sidebar">
        <div class="side-tabs">
            <i class="fa-solid fa-file-pen tab-icon active"></i>
            <i class="fa-solid fa-palette tab-icon"></i>
            <i class="fa-solid fa-font tab-icon"></i>
        </div>
        <div class="editor-area">
            <div class="field">
                <label>배경 이미지 업로드 (4K 권장)</label>
                <input type="file" id="imgInp" accept="image/*">
            </div>
            <div class="field"><label>닉네임</label><input type="text" placeholder="입력하세요"></div>
            <div class="field"><label>소개글</label><textarea rows="6" placeholder="내용을 입력하세요"></textarea></div>
        </div>
    </div>

    <div class="workspace" id="workspace">
        <div id="preview-board">
            <img id="uploaded-img" src="">
            <div class="placeholder" id="placeholder">4K PREVIEW BOARD</div>
        </div>
    </div>
</div>

<script>
    const imgInp = document.getElementById('imgInp');
    const img = document.getElementById('uploaded-img');
    const board = document.getElementById('preview-board');
    const workspace = document.getElementById('workspace');

    imgInp.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            img.src = ev.target.result;
            img.style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
        };
        reader.readAsDataURL(e.target.files);
    };

    let scale = 0.2, pos = { x: 0, y: 0 }, startPos = { x: 0, y: 0 }, isDragging = false;
    const updateTransform = () => { board.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(${scale})`; };

    workspace.onwheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.02 : 0.02;
        scale = Math.min(Math.max(0.05, scale + delta), 2);
        updateTransform();
    };

    workspace.onmousedown = (e) => { if(e.button === 0) { isDragging = true; startPos = { x: e.clientX - pos.x, y: e.clientY - pos.y }; } };
    window.onmousemove = (e) => { if (isDragging) { pos.x = e.clientX - startPos.x; pos.y = e.clientY - startPos.y; updateTransform(); } };
    window.onmouseup = () => { isDragging = false; };

    function saveImage() {
        const oldTransform = board.style.transform;
        board.style.transform = 'none';
        html2canvas(board, { width: 3840, height: 2160 }).then(canvas => {
            const a = document.createElement('a');
            a.download = 'CV2_Sheet_4K.png'; a.href = canvas.toDataURL(); a.click();
            board.style.transform = oldTransform;
        });
    }
    updateTransform();
</script>
</body>
</html>

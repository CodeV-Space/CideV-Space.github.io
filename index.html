<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Maker - @D3LTA_CV</title>
    <script src="https://html2canvas.hertzen.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root {
            --header-h: 35px;
            --sidebar-w: 25vw;
            --tab-w: 55px;
            --accent-gold: #bf9739;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #1a1a1a; color: #eee; overflow: hidden; }

        /* 1. Header Area */
        header {
            height: var(--header-h); background: #111; display: flex;
            align-items: center; justify-content: space-between; padding: 0 15px;
            border-bottom: 1px solid #333; z-index: 100;
        }
        .header-title { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .header-right { display: flex; align-items: center; gap: 12px; font-size: 12px; }
        
        .header-btn {
            width: 24px; height: 24px; background: #2a2a2a; border: 1px solid #444;
            border-radius: 5px; display: flex; align-items: center; justify-content: center;
            color: #fff; text-decoration: none; cursor: pointer; transition: 0.2s;
        }
        .header-btn:hover { border-color: var(--accent-gold); background: #333; }

        /* Main Wrapper */
        .wrapper { display: flex; height: calc(100% - var(--header-h)); }

        /* 2. Sidebar (1/4 Width) */
        .sidebar { width: var(--sidebar-w); display: flex; background: #222; border-right: 1px solid #000; }
        .side-tabs {
            width: var(--tab-w); background: #151515; display: flex;
            flex-direction: column; align-items: center; padding-top: 20px; gap: 20px;
        }
        .tab-icon { color: #555; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .tab-icon.active { color: var(--accent-gold); }

        .editor-area { flex: 1; padding: 25px; overflow-y: auto; }
        .field { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: #ff4444; font-size: 11px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }

        /* 3. Workspace (#4a4645) */
        .workspace {
            flex: 1; background: #4a4645; display: flex;
            align-items: center; justify-content: center; position: relative; 
            overflow: hidden; /* Scroll handles via JS Zoom */
        }

        /* Preview Board: 1200x900, 2px Round, 0.7px Gold Border, 15px Soft Shadow */
        #preview-board {
            width: 1200px; height: 900px; min-width: 1200px; min-height: 900px;
            background: #ffffff; border-radius: 2px;
            border: 0.7px solid var(--accent-gold);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.25);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
            transform-origin: center center;
            transition: transform 0.1s ease-out;
            cursor: grab;
        }
        #uploaded-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .placeholder { color: #ccc; font-size: 32px; font-weight: bold; text-align: center; pointer-events: none; }

        /* Save Button */
        .save-btn {
            position: absolute; bottom: 30px; right: 30px;
            padding: 15px 30px; background: #5e0000; color: white;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">Sheet Generator Prototype</div>
        <div class="header-right">
            <span>@D3LTA_CV</span>
            <a href="https://twitter.com" target="_blank" class="header-btn">
                <i class="fa-brands fa-twitter"></i>
            </a>
            <div class="header-btn" onclick="alert('Help: Use mouse wheel to Zoom in/out.')">
                <i class="fa-solid fa-question"></i>
            </div>
        </div>
    </header>

    <div class="wrapper">
        <div class="sidebar">
            <div class="side-tabs">
                <i class="fa-solid fa-file-lines tab-icon active"></i>
                <i class="fa-solid fa-palette tab-icon"></i>
                <i class="fa-solid fa-font tab-icon"></i>
            </div>
            <div class="editor-area">
                <div class="field">
                    <label>UPLOAD IMAGE</label>
                    <input type="file" id="imgInp" accept="image/*">
                </div>
                <div class="field"><label>NAME / ID</label><input type="text" placeholder="이름을 입력하세요"></div>
                <div class="field"><label>BIO</label><textarea rows="6" placeholder="내용을 입력하세요"></textarea></div>
            </div>
        </div>

        <div class="workspace" id="workspace">
            <div id="preview-board">
                <img id="uploaded-img" src="">
                <div class="placeholder" id="placeholder">1200 x 900 PREVIEW<br><small style="font-size: 14px; font-weight: normal;">(Scroll to Zoom)</small></div>
            </div>
            <button class="save-btn" onclick="saveImage()">Save as PNG</button>
        </div>
    </div>

    <script>
        const imgInp = document.getElementById('imgInp');
        const img = document.getElementById('uploaded-img');
        const placeholder = document.getElementById('placeholder');
        const board = document.getElementById('preview-board');
        const workspace = document.getElementById('workspace');

        // 1. Image Upload
        imgInp.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                img.src = ev.target.result;
                img.style.display = 'block';
                placeholder.style.display = 'none';
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // 2. Scroll Zoom Logic
        let scale = 0.45;
        workspace.onwheel = (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            scale = Math.min(Math.max(0.1, scale + delta), 2);
            board.style.transform = `scale(${scale})`;
        };

        // 3. Save as PNG
        function saveImage() {
            const currentScale = board.style.transform;
            board.style.transform = 'none'; // Capture at 1:1
            html2canvas(board, { width: 1200, height: 900 }).then(canvas => {
                const a = document.createElement('a');
                a.download = 'D3LTA_Sheet.png';
                a.href = canvas.toDataURL();
                a.click();
                board.style.transform = currentScale; // Restore Zoom
            });
        }
    </script>
</body>
</html>

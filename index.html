<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Vein Ⅱ Sheet Maker</title>
    
    <!-- 아이콘(FontAwesome) 및 이미지 저장(html2canvas) 라이브러리 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* --- 변수 설정 (테마 컬러 및 수치) --- */
        :root {
            --header-height: 60px;
            --bg-workspace: #4a4645;
            --bg-sidebar: #2d2a29;
            --bg-header: #1a1a1a;
            --accent-gold: #bf9739;
            --text-white: #ffffff;
            --text-sub: #aaaaaa;
            --btn-size: 30px;
        }

        /* --- 기본 초기화 --- */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-header);
            color: var(--text-white);
            overflow: hidden; /* 브라우저 스크롤 방지 */
            user-select: none; /* 텍스트 선택 방지 */
        }

        /* --- 1. HEADER --- */
        header {
            height: var(--header-height);
            background-color: var(--bg-header);
            border-bottom: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* 중앙 타이틀 (화면 정중앙 절대 위치) */
        .header-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-en {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            margin: 0;
            line-height: 1;
            letter-spacing: 0.5px;
        }

        .title-ko {
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 4px; /* 요청: 4px 간격 */
            font-weight: normal;
            line-height: 1;
        }

        /* 우측 컨트롤 패널 */
        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .author-id {
            font-size: 14px;
            color: #888;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: var(--btn-size);
            height: var(--btn-size);
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .icon-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: #333;
        }

        .save-btn {
            height: 30px;
            padding: 0 16px;
            background-color: var(--accent-gold);
            color: #111;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .save-btn:hover { background-color: #d4a845; }


        /* --- 2. MAIN LAYOUT --- */
        .main-wrapper {
            display: flex;
            height: calc(100vh - var(--header-height));
            width: 100vw;
        }

        /* 좌측 사이드바 (25%) */
        .sidebar {
            width: 25%;
            min-width: 320px;
            background: var(--bg-sidebar);
            border-right: 1px solid #000;
            display: flex;
        }

        /* 탭 레일 */
        .tab-rail {
            width: 50px;
            background: #1e1c1b;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            gap: 15px;
        }
        .tab-icon {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            color: #666; cursor: pointer; border-radius: 4px;
            font-size: 16px; transition: 0.2s;
        }
        .tab-icon.active, .tab-icon:hover {
            color: var(--accent-gold);
            background: rgba(255,255,255,0.05);
        }

        /* 에디터 영역 */
        .editor-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .section-title {
            font-size: 16px; font-weight: bold; color: var(--accent-gold);
            border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px;
        }

        .input-group { margin-bottom: 20px; }
        .input-label { display: block; margin-bottom: 8px; font-size: 12px; color: #aaa; }
        
        input[type="text"], textarea {
            width: 100%; padding: 10px;
            background: #1a1a1a; border: 1px solid #444;
            color: #fff; border-radius: 4px; box-sizing: border-box;
        }
        input[type="file"] {
            width: 100%; padding: 10px;
            background: #1a1a1a; border: 1px dashed #555;
            color: #888; font-size: 12px; cursor: pointer; box-sizing: border-box;
        }


        /* --- 3. RIGHT WORKSPACE --- */
        .workspace {
            flex: 1;
            background-color: var(--bg-workspace);
            position: relative;
            overflow: hidden;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .workspace:active { cursor: grabbing; }

        /* 뷰포트 (줌/이동 대상) */
        #viewport {
            transform-origin: center center;
            transition: transform 0.1s ease-out; /* 부드러운 움직임 */
            will-change: transform;
        }

        /* --- 4K PREVIEW BOX --- */
        .preview-box {
            width: 3840px;
            height: 2160px;
            background-color: #ffffff;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            
            /* [요청사항 반영] */
            /* 1. 20px Smooth Rounded Corners */
            border-radius: 20px;
            overflow: hidden; /* 이미지가 둥근 모서리에 맞춰 잘리도록 설정 */
            
            /* 2. 0.7px Gold Border */
            border: 0.7px solid var(--accent-gold);
            
            /* 3. 25% Dark Shadow with 15px soften */
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.25);
        }

        #preview-img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
        }

        .placeholder-text {
            font-size: 80px; font-weight: bold; color: #ddd;
            text-transform: uppercase; pointer-events: none;
        }

        /* 하단 도움말 오버레이 */
        .help-overlay {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.6); padding: 8px 15px;
            border-radius: 20px; font-size: 12px; color: #fff;
            pointer-events: none; line-height: 1.5; text-align: right;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div style="width: 200px;"></div> <!-- 좌측 여백 -->

        <div class="header-center">
            <h1 class="title-en">Code Vein Ⅱ Sheet Maker</h1>
            <div class="title-ko">코드 베인 Ⅱ 시트 메이커</div>
        </div>

        <div class="header-right">
            <span class="author-id">Made by @D3LTA_CV</span>
            
            <div class="btn-group">
                <a href="https://x.com/D3LTA_CV" target="_blank" class="icon-btn" title="Twitter">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>
                <div class="icon-btn" onclick="alert('휠 스크롤: 확대/축소\n휠 클릭: 화면 초기화\n좌클릭 드래그: 화면 이동')" title="Help">
                    <i class="fa-solid fa-question"></i>
                </div>
            </div>

            <button class="save-btn" onclick="saveImage()">PNG로 저장</button>
        </div>
    </header>

    <!-- MAIN -->
    <div class="main-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="tab-rail">
                <div class="tab-icon active"><i class="fa-solid fa-pen-to-square"></i></div>
                <div class="tab-icon"><i class="fa-solid fa-palette"></i></div>
                <div class="tab-icon"><i class="fa-solid fa-font"></i></div>
            </div>
            <div class="editor-content">
                <div class="section-title">기본 설정</div>
                
                <div class="input-group">
                    <label class="input-label">이미지 업로드 (3840x2160)</label>
                    <input type="file" id="imgInput" accept="image/*">
                </div>

                <div class="input-group">
                    <label class="input-label">캐릭터 이름</label>
                    <input type="text" placeholder="이름 입력">
                </div>

                <div class="input-group">
                    <label class="input-label">설명 / 메모</label>
                    <textarea rows="5" placeholder="내용 입력..."></textarea>
                </div>
            </div>
        </aside>

        <!-- Workspace -->
        <section class="workspace" id="workspace">
            <div id="viewport">
                <div class="preview-box" id="previewBox">
                    <span class="placeholder-text">PREVIEW AREA</span>
                    <img id="preview-img" src="" alt="">
                </div>
            </div>
            
            <div class="help-overlay">
                <i class="fa-solid fa-mouse"></i> Scroll to Zoom &nbsp;|&nbsp; Drag to Move<br>
                <span style="color: #bf9739;"><i class="fa-solid fa-arrow-rotate-left"></i> Middle Click to Reset View</span>
            </div>
        </section>
    </div>

    <!-- SCRIPT -->
    <script>
        const workspace = document.getElementById('workspace');
        const viewport = document.getElementById('viewport');
        const previewBox = document.getElementById('previewBox');
        const imgInput = document.getElementById('imgInput');
        const previewImg = document.getElementById('preview-img');
        const placeholder = document.querySelector('.placeholder-text');

        // --- 상태 변수 ---
        const INITIAL_SCALE = 0.15; // 4K 화면을 한눈에 보기 위한 초기 축소 비율
        let scale = INITIAL_SCALE;
        let isDragging = false;
        let startX, startY, pointX = 0, pointY = 0;

        // --- 1. 뷰포트 업데이트 ---
        function updateTransform() {
            viewport.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        }
        updateTransform(); // 초기 실행

        // --- 2. 이미지 업로드 ---
        imgInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImg.src = event.target.result;
                    previewImg.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // --- 3. 줌 (Wheel) ---
        workspace.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            scale = Math.min(Math.max(0.05, scale + delta), 3); // 0.05배 ~ 3배 제한
            updateTransform();
        }, { passive: false });

        // --- 4. 마우스 입력 처리 (좌클릭 드래그 / 휠 클릭 리셋) ---
        workspace.addEventListener('mousedown', (e) => {
            // [휠 클릭 리셋 기능] : button 1 is Middle Click
            if (e.button === 1) {
                e.preventDefault();
                scale = INITIAL_SCALE;
                pointX = 0;
                pointY = 0;
                updateTransform();
                return;
            }

            // [좌클릭 드래그 기능] : button 0 is Left Click
            if (e.button === 0) {
                isDragging = true;
                startX = e.clientX - pointX;
                startY = e.clientY - pointY;
                workspace.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            pointX = e.clientX - startX;
            pointY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            workspace.style.cursor = 'grab';
        });

        // --- 5. PNG 저장 ---
        function saveImage() {
            const originalTransform = viewport.style.transform;
            viewport.style.transform = 'none'; // 캡처를 위해 1:1 비율로 복구
            
            html2canvas(previewBox, {
                scale: 1, // 4K 원본 해상도 유지
                width: 3840,
                height: 2160,
                useCORS: true,
                backgroundColor: null // 투명도 지원
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'CodeVein_Sheet_4K.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                viewport.style.transform = originalTransform; // 뷰포트 복구
            }).catch(err => {
                console.error(err);
                viewport.style.transform = originalTransform;
                alert('이미지 저장 중 오류가 발생했습니다.');
            });
        }
    </script>
</body>
</html>

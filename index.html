<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE VEIN II - Sheet Maker</title>
    <style>
        :root {
            --accent-color: #D3AF37;
            --bg-dark: #4a4645;
            --preview-bg: #ffffff;
            --border-gold: #bf9739;
            --header-bg: #1e1e1e;
            --active-tab: #2d2d2d;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            overflow: hidden;
            color: white;
        }

        /* --- Header Section --- */
        header {
            background-color: var(--header-bg);
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        .window-controls {
            display: flex;
            justify-content: flex-end;
            padding: 5px 10px;
            gap: 15px;
        }

        .win-btn {
            cursor: pointer;
            font-size: 12px;
            color: #888;
        }

        .win-btn.close:hover { color: #ea0000; }

        .tabs-container {
            display: flex;
            align-items: flex-end;
            padding-left: 10px;
            gap: 5px;
        }

        .tab {
            padding: 8px 20px;
            background: #333;
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid transparent;
        }

        .tab:not(.active):hover {
            transform: scale(1.05);
        }

        .tab.active {
            background: var(--active-tab);
            border-top: 2px solid var(--accent-color);
        }

        .tab img {
            width: 18px; height: 18px;
            border-radius: 4px;
        }

        .plus-btn {
            padding: 5px 10px;
            cursor: pointer;
            font-size: 18px;
            color: #888;
        }

        /* Address Bar */
        .address-bar-row {
            background: var(--active-tab);
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-top: 1px solid #444;
        }

        .nav-btns { display: flex; gap: 10px; }
        .nav-btns span { cursor: pointer; opacity: 0.7; }
        .nav-btns span:hover { opacity: 1; }

        .address-field {
            flex-grow: 1;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 4px;
            text-align: center;
            font-size: 14px;
            color: #aaa;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }

        .icon-square {
            width: 28px; height: 28px;
            background: #333;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        /* --- Main Content --- */
        main {
            display: flex;
            height: calc(100vh - 110px);
        }

        /* Left Box */
        #left-box {
            width: 25%;
            background: #252525;
            display: flex;
            transition: width 0.3s;
            border-right: 1px solid #111;
        }

        #left-box.collapsed { width: 40px; }

        .sub-tabs {
            width: 40px;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 20px;
        }

        .form-content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }

        #left-box.collapsed .form-content { display: none; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--accent-color); }
        input[type="text"], select {
            width: 100%; padding: 8px; background: #333; border: 1px solid #444; color: white;
        }

        .grid-select {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px; text-align: center; font-size: 10px;
        }

        /* Right Box */
        #right-box {
            flex-grow: 1;
            position: relative;
            background-color: var(--bg-dark);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
        }

        #right-box:active { cursor: grabbing; }

        #preview-viewport {
            transform-origin: center;
            transition: transform 0.1s ease-out;
        }

        #preview-box {
            width: 3840px; height: 2160px;
            background-color: var(--preview-bg);
            border-radius: 30px;
            border: 0.7px solid var(--border-gold);
            box-shadow: 0 0 15px rgba(0,0,0,0.25);
            position: relative;
            color: black; /* 시트 내부 텍스트 기본색 */
        }

        /* Help Box */
        #help-box {
            position: absolute;
            bottom: 20px; right: 20px;
            height: 60px;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: width 0.3s, opacity 0.3s;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
        }

        #help-box.minimized { width: 30px; padding: 0 15px; }

        .btn-save {
            background: var(--accent-color);
            color: black;
            border: none;
            padding: 10px;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<header>
    <div class="window-controls">
        <span class="win-btn">—</span>
        <span class="win-btn">▢</span>
        <span class="win-btn close">✕</span>
    </div>
    <div class="tabs-container">
        <div class="tab">
            <img src="Icons/Titles/CV1.png" alt="CV1"> CODE VEIN
        </div>
        <div class="tab active">
            <img src="Icons/Titles/CV2.png" alt="CV2"> CODE VEIN Ⅱ
        </div>
        <div id="tba-tab" class="tab" onclick="easterEgg()">
            TBA
        </div>
        <div class="plus-btn">+</div>
    </div>
    <div class="address-bar-row">
        <div class="nav-btns">
            <span>◀</span> <span>▶</span> <span onclick="location.reload()">⟳</span>
        </div>
        <div class="address-field">https://codevein.sheet/2/main</div>
        <div class="user-info">
            <span>Made by @D3LTA_CV</span>
            <a href="https://x.com/D3LTA_CV" target="_blank" class="icon-square">🐦</a>
            <div class="icon-square">?</div>
        </div>
    </div>
</header>

<main>
    <aside id="left-box">
        <div class="sub-tabs">
            <div style="cursor:pointer;" onclick="toggleLeftBox()">☰</div>
            <span>🎨</span>
            <span>👤</span>
        </div>
        <div class="form-content">
            <div class="input-group">
                <label>NICKNAME</label>
                <input type="text" id="in-nickname" oninput="updatePreview()" placeholder="닉네임을 입력하세요">
            </div>

            <div class="input-group">
                <label>TWEET TENDENCY (다수 선택)</label>
                <div class="grid-select">
                    <label><input type="checkbox" onchange="updatePreview()"> RT</label>
                    <label><input type="checkbox" onchange="updatePreview()"> 마음</label>
                    <label><input type="checkbox" onchange="updatePreview()"> 스크린샷</label>
                </div>
            </div>

            <div class="input-group">
                <label>BUDDY STYLE (택 1)</label>
                <select id="sel-buddy-style" onchange="updatePreview()">
                    <option value="빙의">빙의</option>
                    <option value="소환">소환</option>
                </select>
            </div>

            <div class="input-group">
                <label>PROGRESSION</label>
                <input type="radio" name="prog" checked> 엔딩 횟수
                <input type="radio" name="prog"> New Game+
                <input type="text" style="margin-top:5px;" placeholder="숫자 입력">
            </div>

            <button class="btn-save">
                <span>📥</span> PNG로 저장
            </button>
        </div>
    </aside>

    <section id="right-box" onwheel="handleZoom(event)">
        <div id="preview-viewport">
            <div id="preview-box">
                <div id="view-nickname" style="position:absolute; top:100px; left:100px; font-size:100px; font-weight:bold;"></div>
            </div>
        </div>

        <div id="help-box" onclick="toggleHelp()">
            <span>🖱️</span>
            <div id="help-text">
                좌클릭 드래그: 이동 / 스크롤: 확대·축소 / 휠 클릭: 중앙 정렬
            </div>
        </div>
    </section>
</main>

<script>
    /* --- 이스터 에그 --- */
    let clickCount = 0;
    function easterEgg() {
        clickCount++;
        if (clickCount === 7) {
            const tab = document.getElementById('tba-tab');
            tab.style.color = '#ea0000';
            tab.style.fontWeight = 'bold';
            alert('Easter Egg Activated!');
        }
    }

    /* --- UI 제어 --- */
    function toggleLeftBox() {
        document.getElementById('left-box').classList.toggle('collapsed');
    }

    function toggleHelp() {
        const box = document.getElementById('help-box');
        box.classList.toggle('minimized');
        document.getElementById('help-text').style.display = box.classList.contains('minimized') ? 'none' : 'block';
    }

    /* --- 프리뷰 동기화 --- */
    function updatePreview() {
        const nick = document.getElementById('in-nickname').value;
        document.getElementById('view-nickname').innerText = nick;
        // 나머지 필드들도 동일한 방식으로 preview-box 내부 요소에 연결
    }

    /* --- 줌 & 팬 (Zoom & Pan) 로직 --- */
    let scale = 0.2; // 기본 축소 상태 (3840px이 크므로)
    let posX = 0, posY = 0;
    const viewport = document.getElementById('preview-viewport');
    const rightBox = document.getElementById('right-box');

    function updateTransform() {
        viewport.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    // 초기 중앙 정렬
    updateTransform();

    function handleZoom(e) {
        e.preventDefault();
        scale += e.deltaY * -0.0005;
        scale = Math.min(Math.max(0.05, scale), 2);
        updateTransform();
    }

    let isDragging = false;
    let startX, startY;

    rightBox.addEventListener('mousedown', (e) => {
        if (e.button === 1) { // 휠 클릭: 리셋
            scale = 0.2; posX = 0; posY = 0;
            updateTransform();
            return;
        }
        isDragging = true;
        startX = e.clientX - posX;
        startY = e.clientY - posY;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        posX = e.clientX - startX;
        posY = e.clientY - startY;
        updateTransform();
    });

    window.addEventListener('mouseup', () => isDragging = false);

</script>

</body>
</html>

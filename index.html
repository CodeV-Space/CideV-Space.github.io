<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Vein Ⅱ Sheet Maker</title>
    
    <!-- FontAwesome & Google Fonts & html2canvas -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* --- Variables --- */
        :root {
            --tab-bar-h: 45px;  /* 탭 영역 높이 (인덱스가 튀어나올 공간) */
            --header-h: 60px;   /* 메인 헤더 높이 */
            
            --bg-body: #000000;       
            --bg-workspace: #4a4645;
            --bg-sidebar: #2d2a29;
            --bg-rail: #1e1c1b;
            --bg-header: #1a1a1a;     
            
            --accent-gold: #bf9739;
            --text-white: #ffffff;
            --text-sub: #aaaaaa;
        }

        /* --- Base --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-white);
            overflow: hidden; user-select: none;
        }

        /* --- 1. Index Tab System (Post-it Style) --- */
        .tab-system {
            height: var(--tab-bar-h);
            background-color: #000; /* 배경은 어둡게 */
            display: flex;
            align-items: flex-end; /* 바닥 정렬 */
            padding-left: 30px; /* 왼쪽 여백 */
            gap: 6px; /* 탭 사이 간격 */
            position: relative;
            z-index: 90;
        }

        .nav-tab {
            height: 32px; /* 기본 높이 */
            padding: 0 24px;
            background-color: #252525; /* 비활성 탭 색상 */
            color: #666;
            
            /* 인덱스 모양 (위쪽만 둥글게) */
            border-radius: 8px 8px 0 0; 
            border: 1px solid #333;
            border-bottom: none; /* 아래쪽은 뚫어둠 */
            
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            bottom: 0;
        }

        /* Hover Effect: 쑥 올라오는 느낌 */
        .nav-tab:hover {
            height: 38px;
            background-color: #333;
            color: #ccc;
        }

        /* Active Tab: 헤더와 합체 */
        .nav-tab.active {
            height: 42px; /* 가장 높게 */
            background-color: var(--bg-header); /* 헤더 색상과 일치 */
            color: var(--accent-gold); /* 활성 텍스트 골드 */
            
            border-color: var(--accent-gold); /* 테두리 골드 */
            border-bottom: 1px solid var(--bg-header); /* 하단 테두리를 배경색으로 덮어서 뚫린 효과 */
            
            z-index: 101; /* 헤더보다 위로 */
            margin-bottom: -1px; /* 헤더 라인을 덮기 위해 1px 내림 */
            box-shadow: 0 -3px 10px rgba(0,0,0,0.5); /* 입체감 */
        }

        /* --- 2. Header (Main Surface) --- */
        header {
            height: var(--header-h);
            background-color: var(--bg-header);
            
            /* 상단 테두리: 활성 탭과 이어지는 라인 */
            border-top: 1px solid var(--accent-gold); 
            border-bottom: 1px solid #000;
            
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            position: relative; z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .header-center {
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .title-en { font-size: 18px; font-weight: 700; text-transform: uppercase; margin: 0; line-height: 1; }
        .title-ko { font-size: 14px; color: var(--text-sub); margin-top: 4px; font-weight: 400; line-height: 1; }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
        .author-id { font-size: 14px; color: #888; font-weight: 500; }
        .btn-group { display: flex; gap: 10px; }
        
        .icon-btn {
            width: 30px; height: 30px;
            background: #2a2a2a; border: 1px solid #444; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            color: #ccc; text-decoration: none; cursor: pointer; transition: all 0.2s;
        }
        .icon-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); background: #333; }

        .save-btn {
            height: 30px; padding: 0 16px;
            background-color: var(--accent-gold); color: #111;
            border: none; border-radius: 4px;
            font-weight: bold; font-size: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 6px; transition: background 0.2s;
        }
        .save-btn:hover { background-color: #d4a845; }


        /* --- 3. Layout --- */
        .main-wrapper {
            display: flex;
            height: calc(100vh - var(--tab-bar-h) - var(--header-h)); /* 높이 계산 */
            width: 100vw;
            position: relative;
        }

        /* Sidebar */
        .sidebar-container {
            display: flex; background: var(--bg-sidebar); border-right: 1px solid #000;
            position: relative; z-index: 20;
        }
        .tab-rail {
            width: 60px; min-width: 60px; background: var(--bg-rail); border-right: 1px solid #333;
            display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 15px;
        }
        .tab-icon {
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            color: #666; cursor: pointer; border-radius: 4px; font-size: 16px; transition: 0.2s;
        }
        .tab-icon.active, .tab-icon:hover { color: var(--accent-gold); background: rgba(255,255,255,0.05); }

        .editor-panel {
            width: 320px; overflow: hidden; background: var(--bg-sidebar);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        .sidebar-container.collapsed .editor-panel { width: 0px; }
        
        .toggle-btn {
            position: absolute; right: -24px; top: 50%; transform: translateY(-50%);
            width: 24px; height: 50px; background: #222; border: 1px solid #000; border-left: none;
            border-radius: 0 8px 8px 0; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent-gold); z-index: 25;
        }

        .editor-content { padding: 20px; width: 320px; box-sizing: border-box; overflow-y: auto; }
        .section-title { font-size: 16px; font-weight: 700; color: var(--accent-gold); border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        .input-label { display: block; margin-bottom: 8px; font-size: 12px; color: #aaa; }
        input[type="text"], textarea { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }
        input[type="file"] { width: 100%; padding: 10px; background: #1a1a1a; border: 1px dashed #555; color: #888; font-size: 12px; cursor: pointer; box-sizing: border-box; }

        /* Workspace */
        .workspace {
            flex: 1; background-color: var(--bg-workspace);
            position: relative; overflow: hidden; cursor: grab;
            display: flex; align-items: center; justify-content: center;
        }
        .workspace:active { cursor: grabbing; }
        #viewport { transform-origin: center center; transition: transform 0.1s ease-out; will-change: transform; }

        /* Preview Box */
        .preview-box {
            width: 3840px; height: 2160px; background-color: #ffffff;
            position: relative; display: flex; align-items: center; justify-content: center;
            border-radius: 30px; overflow: hidden;
            border: 0.7px solid var(--accent-gold);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.25);
        }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .placeholder-text { font-size: 80px; font-weight: 700; color: #ddd; pointer-events: none; }

        /* Helper Box */
        .helper-box {
            position: absolute; bottom: 30px; right: 30px; height: 60px;
            background-color: rgba(30, 30, 30, 0.7); backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;
            display: flex; align-items: center; padding: 0 30px; gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); pointer-events: none;
            color: #eee; font-size: 13px;
        }
        .helper-item { display: flex; align-items: center; gap: 8px; }
        .helper-item i { color: var(--accent-gold); font-size: 14px; }
        .divider { width: 1px; height: 16px; background: rgba(255,255,255,0.2); }
        .helper-strong { font-weight: 700; color: #fff; }

    </style>
</head>
<body>

    <!-- 1. Index Post-it Tabs -->
    <nav class="tab-system">
        <div class="nav-tab">Code Vein</div>
        <div class="nav-tab active">Code Vein Ⅱ</div>
        <div class="nav-tab">TBA</div>
    </nav>

    <!-- 2. Header (Main Sheet Surface) -->
    <header>
        <div style="width: 200px;"></div>

        <div class="header-center">
            <h1 class="title-en">Code Vein Ⅱ Sheet Maker</h1>
            <div class="title-ko">코드 베인 Ⅱ 시트 메이커</div>
        </div>

        <div class="header-right">
            <span class="author-id">Made by @D3LTA_CV</span>
            <div class="btn-group">
                <a href="https://x.com/D3LTA_CV" target="_blank" class="icon-btn" title="Twitter">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>
                <div class="icon-btn" title="Help" onclick="alert('우측 하단 안내를 확인하세요.')">
                    <i class="fa-solid fa-question"></i>
                </div>
            </div>
            <button class="save-btn" onclick="saveImage()">
                <i class="fa-solid fa-download"></i> PNG로 저장
            </button>
        </div>
    </header>

    <!-- 3. Main Content -->
    <div class="main-wrapper">
        
        <!-- Sidebar -->
        <aside class="sidebar-container" id="sidebar">
            <div class="tab-rail">
                <div class="tab-icon active"><i class="fa-solid fa-pen-to-square"></i></div>
                <div class="tab-icon"><i class="fa-solid fa-palette"></i></div>
                <div class="tab-icon"><i class="fa-solid fa-font"></i></div>
            </div>
            <div class="editor-panel">
                <div class="editor-content">
                    <div class="section-title">기본 설정</div>
                    <div class="input-group">
                        <label class="input-label">배경 이미지 (4K 권장)</label>
                        <input type="file" id="imgInput" accept="image/*">
                    </div>
                    <div class="input-group">
                        <label class="input-label">캐릭터 이름</label>
                        <input type="text" placeholder="이름을 입력하세요">
                    </div>
                    <div class="input-group">
                        <label class="input-label">메모 / 설정</label>
                        <textarea rows="6" placeholder="내용을 입력하세요..."></textarea>
                    </div>
                </div>
            </div>
            <div class="toggle-btn" id="toggleBtn">
                <i class="fa-solid fa-chevron-left" id="toggleIcon"></i>
            </div>
        </aside>

        <!-- Workspace -->
        <section class="workspace" id="workspace">
            <div id="viewport">
                <div class="preview-box" id="board">
                    <span class="placeholder-text">PREVIEW AREA</span>
                    <img id="preview-img" src="" alt="">
                </div>
            </div>

            <!-- Helper Box -->
            <div class="helper-box">
                <div class="helper-item">
                    <i class="fa-solid fa-computer-mouse"></i>
                    <span class="helper-strong">조작법</span>
                </div>
                <div class="divider"></div>
                <div class="helper-item">
                    <i class="fa-solid fa-hand-pointer"></i> <span>드래그 : 이동</span>
                </div>
                <div class="helper-item">
                    <i class="fa-solid fa-magnifying-glass"></i> <span>휠 : 확대/축소</span>
                </div>
                <div class="helper-item">
                    <i class="fa-solid fa-arrow-rotate-left"></i> <span>휠 클릭 : 중앙 정렬</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        // DOM Elements
        const workspace = document.getElementById('workspace');
        const viewport = document.getElementById('viewport');
        const board = document.getElementById('board');
        const imgInput = document.getElementById('imgInput');
        const previewImg = document.getElementById('preview-img');
        const placeholder = document.querySelector('.placeholder-text');
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggleBtn');
        const toggleIcon = document.getElementById('toggleIcon');

        // 1. Sidebar Toggle
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                toggleIcon.className = 'fa-solid fa-chevron-right';
            } else {
                toggleIcon.className = 'fa-solid fa-chevron-left';
            }
        });

        // 2. Viewport Logic
        const INITIAL_SCALE = 0.15; 
        let scale = INITIAL_SCALE;
        let isDragging = false;
        let startX, startY, pointX = 0, pointY = 0;

        function updateTransform() {
            viewport.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        }
        updateTransform();

        // 3. Image Upload
        imgInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImg.src = event.target.result;
                    previewImg.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // 4. Zoom (Wheel)
        workspace.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            scale = Math.min(Math.max(0.05, scale + delta), 3);
            updateTransform();
        }, { passive: false });

        // 5. Interaction (Pan & Reset)
        workspace.addEventListener('mousedown', (e) => {
            if (e.button === 1) { // Middle Click
                e.preventDefault();
                scale = INITIAL_SCALE;
                pointX = 0; pointY = 0;
                updateTransform();
                return;
            }
            if (e.button === 0) { // Left Click
                isDragging = true;
                startX = e.clientX - pointX;
                startY = e.clientY - pointY;
                workspace.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            pointX = e.clientX - startX;
            pointY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            workspace.style.cursor = 'grab';
        });

        // 6. Save
        function saveImage() {
            const originalTransform = viewport.style.transform;
            viewport.style.transform = 'none'; 
            html2canvas(board, {
                scale: 1, width: 3840, height: 2160,
                useCORS: true, backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'CodeVein_Sheet.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                viewport.style.transform = originalTransform;
            });
        }
    </script>
</body>
</html>

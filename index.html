<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Vein Ⅱ Sheet Maker</title>
    
    <!-- FontAwesome (아이콘) & html2canvas (이미지 저장) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* --- 디자인 변수 설정 --- */
        :root {
            --header-h: 60px;      /* 텍스트 수용을 위한 최적 높이 */
            --btn-size: 30px;      /* 요청하신 버튼 크기 */
            --bg-workspace: #4a4645;
            --bg-sidebar: #2d2a29;
            --bg-header: #1a1a1a;
            --accent-gold: #bf9739;
            --text-white: #ffffff;
            --text-sub: #aaaaaa;
        }

        /* --- 기본 초기화 --- */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-header);
            color: var(--text-white);
            overflow: hidden; /* 스크롤 방지 */
            user-select: none; /* UI 드래그 방지 */
        }

        /* --- 1. Header 영역 --- */
        header {
            height: var(--header-h);
            background-color: var(--bg-header);
            border-bottom: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 타이틀 그룹 (화면 정중앙 절대 위치) */
        .header-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-en {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            margin: 0;
            line-height: 1;
            letter-spacing: 0.5px;
        }

        .title-ko {
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 4px; /* 요청하신 4px 간격 */
            font-weight: normal;
            line-height: 1;
        }

        /* 우측 컨트롤 (ID, 버튼, 저장) */
        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .author-id {
            font-size: 14px;
            color: #888;
            font-weight: 500;
        }

        /* 아이콘 버튼 그룹 */
        .btn-group {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: var(--btn-size);
            height: var(--btn-size);
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px; /* 둥근 모서리 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .icon-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: #333;
        }

        /* PNG 저장 버튼 */
        .save-btn {
            height: 30px;
            padding: 0 16px;
            background-color: var(--accent-gold);
            color: #111;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .save-btn:hover { background-color: #d4a845; }


        /* --- 2. Main Layout (Sidebar + Workspace) --- */
        .main-wrapper {
            display: flex;
            height: calc(100vh - var(--header-h));
            width: 100vw;
        }

        /* Left Sidebar (1/4 크기) */
        .sidebar {
            width: 25%;
            min-width: 320px;
            background: var(--bg-sidebar);
            border-right: 1px solid #000;
            display: flex;
        }

        /* 탭 메뉴 (사이드바 왼쪽) */
        .tab-strip {
            width: 50px;
            background: #1e1c1b;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            gap: 15px;
        }
        .tab-icon {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            color: #666; cursor: pointer; border-radius: 4px;
            transition: 0.2s; font-size: 16px;
        }
        .tab-icon.active, .tab-icon:hover {
            color: var(--accent-gold);
            background: rgba(255,255,255,0.05);
        }

        /* 에디터 콘텐츠 영역 */
        .editor-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .section-header {
            font-size: 16px; font-weight: bold; color: var(--accent-gold);
            border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px;
        }
        
        .input-group { margin-bottom: 20px; }
        .label { display: block; margin-bottom: 8px; font-size: 12px; color: #aaa; }
        
        input[type="text"], textarea {
            width: 100%; padding: 10px;
            background: #1a1a1a; border: 1px solid #444;
            color: #fff; border-radius: 4px; box-sizing: border-box;
        }
        input[type="file"] {
            width: 100%; padding: 10px;
            background: #1a1a1a; border: 1px dashed #555;
            color: #888; font-size: 12px; cursor: pointer; box-sizing: border-box;
        }

        /* --- 3. Right Workspace (Preview) --- */
        .workspace {
            flex: 1;
            background-color: var(--bg-workspace);
            position: relative;
            overflow: hidden;
            cursor: grab; /* 드래그 가능 표시 */
            display: flex; align-items: center; justify-content: center;
        }
        .workspace:active { cursor: grabbing; }

        /* 뷰포트 (줌/이동 대상) */
        #viewport {
            transform-origin: center center;
            transition: transform 0.08s linear; /* 부드러운 움직임 */
            will-change: transform;
        }

        /* 4K 프리뷰 보드 스타일 */
        .preview-board {
            width: 3840px;
            height: 2160px;
            background-color: #ffffff;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            
            /* 요청 사항 적용 */
            border-radius: 2px;
            border: 0.7px solid var(--accent-gold);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.25); /* 15px Soften Shadow */
        }

        #preview-image {
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
            border-radius: 2px;
        }

        .placeholder {
            font-size: 100px; font-weight: bold; color: #ddd;
            text-transform: uppercase; pointer-events: none;
        }

        /* 안내 오버레이 */
        .help-overlay {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.6); padding: 8px 12px;
            border-radius: 4px; font-size: 12px; color: #fff; pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div style="width: 200px;"></div> <!-- 좌측 여백 (밸런스용) -->

        <div class="header-center">
            <h1 class="title-en">CODE VEIN Ⅱ SHEET MAKER</h1>
            <div class="title-ko">코드 베인 Ⅱ 시트 메이커</div>
        </div>

        <div class="header-right">
            <span class="author-id">Made by @D3LTA_CV</span>
            
            <div class="btn-group">
                <!-- 트위터 버튼 -->
                <a href="https://x.com/D3LTA_CV" target="_blank" class="icon-btn" title="Twitter">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>
                <!-- 도움말 버튼 -->
                <div class="icon-btn" onclick="alert('휠: 확대/축소\n드래그: 화면 이동')" title="Help">
                    <i class="fa-solid fa-question"></i>
                </div>
            </div>

            <!-- 저장 버튼 -->
            <button class="save-btn" onclick="saveImage()">PNG로 저장</button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="main-wrapper">
        
        <!-- LEFT SIDEBAR -->
        <aside class="sidebar">
            <div class="tab-strip">
                <div class="tab-icon active" title="Edit"><i class="fa-solid fa-pen-to-square"></i></div>
                <div class="tab-icon" title="Style"><i class="fa-solid fa-palette"></i></div>
                <div class="tab-icon" title="Text"><i class="fa-solid fa-font"></i></div>
            </div>

            <div class="editor-content">
                <div class="section-header">기본 설정</div>
                
                <div class="input-group">
                    <label class="label">배경 이미지 (3840x2160 권장)</label>
                    <input type="file" id="imgInput" accept="image/*">
                </div>

                <div class="input-group">
                    <label class="label">캐릭터 이름</label>
                    <input type="text" placeholder="이름 입력">
                </div>

                <div class="input-group">
                    <label class="label">설명 / 메모</label>
                    <textarea rows="6" placeholder="내용을 입력하세요..."></textarea>
                </div>
            </div>
        </aside>

        <!-- RIGHT WORKSPACE -->
        <section class="workspace" id="workspace">
            <div id="viewport">
                <div class="preview-board" id="board">
                    <span class="placeholder">PREVIEW AREA</span>
                    <img id="preview-image" src="" alt="Background">
                </div>
            </div>
            <div class="help-overlay">
                <i class="fa-solid fa-mouse"></i> Scroll to Zoom | Drag to Move
            </div>
        </section>
    </div>

    <!-- 기능 스크립트 -->
    <script>
        const workspace = document.getElementById('workspace');
        const viewport = document.getElementById('viewport');
        const board = document.getElementById('board');
        const imgInput = document.getElementById('imgInput');
        const previewImage = document.getElementById('preview-image');
        const placeholder = document.querySelector('.placeholder');

        // --- 상태 변수 ---
        let scale = 0.15; // 4K 화면을 보기 좋게 축소해서 시작
        let isDragging = false;
        let startX, startY, pointX = 0, pointY = 0;

        // --- 1. 화면 갱신 함수 ---
        function updateTransform() {
            viewport.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        }
        updateTransform();

        // --- 2. 이미지 업로드 프리뷰 ---
        imgInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImage.src = event.target.result;
                    previewImage.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // --- 3. 마우스 휠 줌 (Zoom) ---
        workspace.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            scale = Math.min(Math.max(0.05, scale + delta), 3); // 최소 0.05배 ~ 최대 3배
            updateTransform();
        }, { passive: false });

        // --- 4. 드래그 이동 (Pan) ---
        workspace.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; // 좌클릭만 허용
            isDragging = true;
            startX = e.clientX - pointX;
            startY = e.clientY - pointY;
            workspace.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            pointX = e.clientX - startX;
            pointY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            workspace.style.cursor = 'grab';
        });

        // --- 5. PNG 저장 기능 ---
        function saveImage() {
            const originalTransform = viewport.style.transform;
            viewport.style.transform = 'none'; // 캡처를 위해 정위치/정사이즈 복구
            
            html2canvas(board, {
                scale: 1, // 원본 해상도(3840x2160) 유지
                width: 3840,
                height: 2160,
                backgroundColor: null,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'CodeVein_Sheet.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                viewport.style.transform = originalTransform; // 뷰 복구
            });
        }
    </script>
</body>
</html>

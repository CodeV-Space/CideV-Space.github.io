<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE VEIN Ⅱ SHEET MAKER</title>
    
    <!-- 캡처 및 아이콘 라이브러리 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- Global Variables --- */
        :root {
            --header-height: 60px; /* 텍스트 적재를 위한 최소 높이 */
            --bg-workspace: #4a4645;
            --bg-sidebar: #2d2a29;
            --bg-header: #1a1a1a;
            --accent-gold: #bf9739;
            --text-white: #ffffff;
            --text-sub: #aaa;
            --btn-size: 30px; /* 요청하신 버튼 크기 */
        }

        /* --- Reset --- */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
            background-color: var(--bg-header);
            color: var(--text-white);
            overflow: hidden;
            user-select: none;
        }

        /* --- 1. Header --- */
        header {
            height: var(--header-height);
            background-color: var(--bg-header);
            border-bottom: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Center Title (Absolute) */
        .header-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-en {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            margin: 0;
            line-height: 1;
            letter-spacing: 1px;
        }

        .title-ko {
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 4px; /* 요청: 4px 간격 */
            font-weight: normal;
            line-height: 1;
        }

        /* Right Controls */
        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px; /* 요소 간 간격 */
        }

        .author-id {
            font-size: 14px;
            color: #888;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            gap: 10px; /* 버튼 사이 간격 */
        }

        /* Square Buttons (30px) */
        .icon-btn {
            width: var(--btn-size);
            height: var(--btn-size);
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: #333;
        }

        /* Save Button */
        .save-btn {
            height: 30px;
            padding: 0 16px;
            background-color: var(--accent-gold);
            color: #111;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .save-btn:hover { background-color: #d4a845; }


        /* --- 2. Main Layout --- */
        .main-container {
            display: flex;
            height: calc(100vh - var(--header-height));
            width: 100vw;
        }

        /* Left Sidebar (25%) */
        .sidebar {
            width: 25%;
            min-width: 320px;
            background: var(--bg-sidebar);
            border-right: 1px solid #000;
            display: flex;
        }

        /* Tab Rail */
        .tab-rail {
            width: 50px;
            background: #1e1c1b;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            gap: 15px;
        }
        .tab-item {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            color: #666; cursor: pointer; font-size: 16px;
            border-radius: 4px; transition: 0.2s;
        }
        .tab-item.active, .tab-item:hover {
            color: var(--accent-gold);
            background: rgba(255,255,255,0.05);
        }

        /* Editor Content */
        .editor-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .section-title {
            font-size: 16px; font-weight: bold; color: var(--accent-gold);
            border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px;
        }

        .input-group { margin-bottom: 20px; }
        .input-label { display: block; margin-bottom: 8px; font-size: 12px; color: #aaa; }
        
        input[type="text"], textarea {
            width: 100%; padding: 10px;
            background: #1a1a1a; border: 1px solid #444;
            color: #fff; border-radius: 4px; box-sizing: border-box;
        }
        input[type="file"] {
            width: 100%; padding: 10px;
            background: #1a1a1a; border: 1px dashed #555;
            color: #888; font-size: 12px; cursor: pointer; box-sizing: border-box;
        }


        /* --- 3. Right Workspace --- */
        .workspace {
            flex: 1;
            background-color: var(--bg-workspace);
            position: relative;
            overflow: hidden;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .workspace:active { cursor: grabbing; }

        /* Transform Container */
        #viewport {
            transform-origin: center center;
            will-change: transform;
            transition: transform 0.05s linear; /* 부드러운 줌 */
        }

        /* The 4K Preview Board */
        .preview-board {
            width: 3840px;
            height: 2160px;
            background-color: #ffffff;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* 요청 스타일 */
            border-radius: 2px;
            border: 0.7px solid var(--accent-gold);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.25); /* 25% dark shadow, 15px soften */
        }

        #preview-img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
            border-radius: 2px;
        }

        .placeholder-text {
            font-size: 80px; font-weight: bold; color: #ddd;
            text-transform: uppercase; pointer-events: none;
        }

        /* Helper Overlay */
        .helper-text {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.6); padding: 8px 12px;
            border-radius: 4px; font-size: 12px; color: #fff;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <!-- Spacer for layout balance -->
        <div style="width: 200px;"></div>

        <!-- Center Titles -->
        <div class="header-center">
            <h1 class="title-en">CODE VEIN Ⅱ SHEET MAKER</h1>
            <div class="title-ko">코드 베인 Ⅱ 시트 메이커</div>
        </div>

        <!-- Right Controls -->
        <div class="header-right">
            <span class="author-id">Made by @D3LTA_CV</span>
            
            <div class="btn-group">
                <!-- Twitter -->
                <a href="https://x.com/D3LTA_CV" target="_blank" class="icon-btn" title="Twitter">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>
                <!-- Help -->
                <div class="icon-btn" onclick="alert('휠: 확대/축소\n드래그: 화면 이동')" title="Help">
                    <i class="fa-solid fa-question"></i>
                </div>
            </div>

            <!-- Save -->
            <button class="save-btn" onclick="saveImage()">PNG로 저장</button>
        </div>
    </header>

    <!-- MAIN WRAPPER -->
    <div class="main-container">
        
        <!-- LEFT SIDEBAR -->
        <aside class="sidebar">
            <div class="tab-rail">
                <div class="tab-item active"><i class="fa-solid fa-pen-to-square"></i></div>
                <div class="tab-item"><i class="fa-solid fa-palette"></i></div>
                <div class="tab-item"><i class="fa-solid fa-font"></i></div>
            </div>
            
            <div class="editor-area">
                <div class="section-title">기본 설정</div>
                
                <div class="input-group">
                    <label class="input-label">배경 이미지 업로드 (3840x2160)</label>
                    <input type="file" id="imgInput" accept="image/*">
                </div>

                <div class="input-group">
                    <label class="input-label">캐릭터 이름</label>
                    <input type="text" placeholder="이름을 입력하세요">
                </div>

                <div class="input-group">
                    <label class="input-label">설명 / 메모</label>
                    <textarea rows="5" placeholder="내용을 입력하세요..."></textarea>
                </div>
            </div>
        </aside>

        <!-- RIGHT WORKSPACE -->
        <section class="workspace" id="workspace">
            <div id="viewport">
                <div class="preview-board" id="board">
                    <span class="placeholder-text">PREVIEW AREA</span>
                    <img id="preview-img" src="" alt="">
                </div>
            </div>
            
            <div class="helper-text">
                <i class="fa-solid fa-mouse"></i> Scroll to Zoom | Drag to Move
            </div>
        </section>
    </div>

    <!-- SCRIPTS -->
    <script>
        const workspace = document.getElementById('workspace');
        const viewport = document.getElementById('viewport');
        const board = document.getElementById('board');
        const imgInput = document.getElementById('imgInput');
        const previewImg = document.getElementById('preview-img');
        const placeholder = document.querySelector('.placeholder-text');

        // --- State ---
        let scale = 0.15; // Start zoomed out to see the 4K board
        let isDragging = false;
        let startX, startY, pointX = 0, pointY = 0;

        // --- 1. Init Transform ---
        function updateTransform() {
            viewport.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        }
        updateTransform();

        // --- 2. Image Upload ---
        imgInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImg.src = event.target.result;
                    previewImg.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // --- 3. Zoom (Wheel) ---
        workspace.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            scale = Math.min(Math.max(0.05, scale + delta), 3); // Min 0.05x, Max 3x
            updateTransform();
        }, { passive: false });

        // --- 4. Pan (Drag) ---
        workspace.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; // Left click only
            isDragging = true;
            startX = e.clientX - pointX;
            startY = e.clientY - pointY;
            workspace.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            pointX = e.clientX - startX;
            pointY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            workspace.style.cursor = 'grab';
        });

        // --- 5. Save to PNG ---
        function saveImage() {
            const originalTransform = viewport.style.transform;
            viewport.style.transform = 'none'; // Reset for capture
            
            html2canvas(board, {
                scale: 1,
                width: 3840,
                height: 2160,
                useCORS: true,
                backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'CodeVein_Sheet.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                viewport.style.transform = originalTransform; // Restore view
            });
        }
    </script>
</body>
</html>

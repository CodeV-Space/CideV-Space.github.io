<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Vein Ⅱ Sheet Maker</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --accent-gold: #D3AF37;
            --accent-border: #bf9739;
            --accent-blood: #ea0000;
            --current-accent: var(--accent-gold);
            --bg-frame: #121212;
            --bg-header: #2a2a2a;
            --bg-tab-inactive: #1a1a1a;
            --bg-workspace: #4a4645;
            --bg-sidebar: #2d2a29;
            --bg-rail: #1e1c1b;
            --text-white: #ffffff;
            --text-sub: #aaaaaa;
            --tab-h: 42px;
            --address-h: 50px;
            --editor-w: 350px;
            transition: --current-accent 1s ease;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-frame);
            color: var(--text-white);
            overflow: hidden;
            user-select: none;
        }

        /* --- Window Controls & Header (기존 유지) --- */
        .window-controls { position: absolute; top: 0; right: 0; height: var(--tab-h); display: flex; z-index: 200; }
        .win-btn { width: 46px; height: 100%; display: flex; align-items: center; justify-content: center; color: #888; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .win-btn:hover { background-color: #333; color: #fff; }
        .win-btn.close:hover { background-color: #e81123; color: #fff; }

        .browser-top { height: var(--tab-h); background-color: var(--bg-frame); display: flex; align-items: flex-end; padding-left: 10px; gap: 6px; padding-right: 140px; }
        .tab { height: 32px; padding: 0 20px; background-color: var(--bg-tab-inactive); color: #888; border-radius: 10px 10px 0 0; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 1s ease; }
        .tab.active { height: 36px; background-color: var(--bg-header); color: var(--text-white); z-index: 10; }
        .tab-icon { width: 18px; height: 18px; object-fit: cover; border-radius: 4px; }
        .tab-plus { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: #888; cursor: pointer; border-radius: 50%; transition: 0.2s; margin-bottom: 2px; }

        /* --- Address Bar --- */
        .address-bar-row { height: var(--address-h); background-color: var(--bg-header); border-bottom: 1px solid #000; display: flex; align-items: center; padding: 0 20px; gap: 16px; position: relative; z-index: 9; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .address-input { flex: 1; height: 32px; background-color: #1a1a1a; border: 1px solid #444; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: #ddd; font-size: 14px; }

        /* --- Layout 구조 (수정됨) --- */
        .main-wrapper { display: flex; height: calc(100vh - var(--tab-h) - var(--address-h)); width: 100vw; position: relative; }
        
        .sidebar-container { display: flex; background: var(--bg-sidebar); border-right: 1px solid #000; z-index: 20; position: relative; overflow: visible !important; }
        .tab-rail { width: 60px; background: var(--bg-rail); border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 10px; overflow-y: auto; padding-bottom: 20px; }
        .tab-rail::-webkit-scrollbar { display: none; }

        /* 사이드바 패널 및 저장 버튼 하단 고정 핵심 CSS */
        .editor-panel { 
            height: 100%; 
            width: var(--editor-w); 
            background: var(--bg-sidebar); 
            display: flex; 
            flex-direction: column; /* 세로 정렬 */
            overflow: hidden; 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .sidebar-container.collapsed .editor-panel { width: 0px; }

        .editor-content { 
            flex: 1; /* 남는 공간 모두 차지하여 푸터를 아래로 밀어냄 */
            padding: 20px; 
            width: var(--editor-w); 
            box-sizing: border-box; 
            overflow-y: auto; 
            padding-bottom: 40px; /* 마지막 항목 여유 공간 */
        }

        .sidebar-footer { 
            flex-shrink: 0; /* 절대 줄어들지 않음 */
            padding: 15px; 
            border-top: 1px solid #333; 
            background: var(--bg-sidebar); 
            z-index: 10; 
        }

        /* --- 이미지 선택 옵션 (둥근 모서리 및 콤팩트 크기) --- */
        .img-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 12px; /* 둥근 모서리 적용 */
            border: 1px solid transparent;
            background: transparent;
            flex: 0 0 18%;      /* 한 줄 5개 배치용 */
            max-width: 65px;    /* 가로 길이 제한 */
            padding: 5px;
            margin: 2px;
            box-sizing: border-box;
        }
        .img-option:hover { background: rgba(255, 255, 255, 0.03); border-color: #444; }
        .img-option.selected { 
            background: rgba(211, 175, 55, 0.1); 
            border-color: var(--current-accent); 
            color: var(--current-accent);
            font-weight: bold;
        }
        .img-option img { width: 30px; height: 30px; object-fit: contain; margin-bottom: 4px; }
        .img-option span { font-size: 9px; white-space: nowrap; letter-spacing: -0.7px; }

        /* --- 공통 폼 스타일 --- */
        .section-title { font-size: 14px; font-weight: 700; color: var(--current-accent); border-bottom: 1px solid #444; padding-bottom: 8px; margin-bottom: 15px; margin-top: 10px; transition: color 1s ease; }
        .grid-options { display: grid; gap: 5px; }
        .check-item { font-size: 11px; background: #222; padding: 5px; border-radius: 3px; cursor: pointer; text-align: center; border: 1px solid transparent; transition: 1s ease; }
        .check-item.selected { border-color: var(--current-accent); color: var(--current-accent); }
        input[type="text"] { width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }
        .sub-input { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border-left: 3px solid var(--current-accent); margin: 10px 0 20px 0; }

        /* --- Workspace & Preview (기존 유지) --- */
        .workspace { flex: 1; background-color: var(--bg-workspace); position: relative; overflow: hidden; cursor: grab; }
        #viewport { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.18); transform-origin: center center; display: flex; flex-direction: column; align-items: center; }
        .preview-box { width: 3840px; height: 2160px; background-color: #ffffff; position: relative; border-radius: 30px; border: 1px solid var(--accent-border); box-shadow: 0 0 100px rgba(0,0,0,0.5); flex-shrink: 0; overflow: hidden; }
        .save-btn { width: 100%; height: 45px; background-color: var(--current-accent); color: #111; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .toggle-btn { position: absolute; right: -20px; top: 100px; width: 20px; height: 50px; background: #222; border: 1px solid #000; border-left: none; border-radius: 0 8px 8px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--current-accent); z-index: 25; }
    </style>
</head>
<body>

    <div class="window-controls">
        <div class="win-btn"><i class="fa-solid fa-minus"></i></div>
        <div class="win-btn"><i class="fa-regular fa-square"></i></div>
        <div class="win-btn close"><i class="fa-solid fa-xmark"></i></div>
    </div>

    <div class="browser-top">
        <div class="tab"><img src="Icons/Titles/CV1.png" class="tab-icon"> CODE VEIN</div>
        <div class="tab active"><img src="Icons/Titles/CV2.png" class="tab-icon"> CODE VEIN Ⅱ</div>
        <div class="tab" id="eggTab">TBA</div>
        <div class="tab-plus"><i class="fa-solid fa-plus"></i></div>
    </div>

    <div class="address-bar-row">
        <div class="nav-controls">
            <div class="nav-btn"><i class="fa-solid fa-arrow-left"></i></div>
            <div class="nav-btn"><i class="fa-solid fa-arrow-right"></i></div>
            <div class="nav-btn" onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i></div>
        </div>
        <div class="address-input">
            <i class="fa-solid fa-lock" id="addrLock" style="color: var(--current-accent); margin-right: 8px;"></i>
            <span>https://codevein.sheet/2/main</span>
        </div>
        <div class="right-controls" style="display:flex; align-items:center; gap:10px;">
            <span class="author-id" style="color:#888; font-size:12px;">Made by @D3LTA_CV</span>
            <div class="icon-btn" style="cursor:pointer;"><i class="fa-solid fa-question"></i></div>
        </div>
    </div>

    <div class="main-wrapper">
        <aside class="sidebar-container" id="sidebar">
            <div class="tab-rail">
                <div class="tab-icon-btn active" title="트위터 계정 성향"><i class="fa-solid fa-pen-to-square"></i></div>
                <div class="tab-icon-btn" title="게임 성향"><i class="fa-solid fa-gamepad"></i></div>
                <div class="tab-icon-btn" title="엔딩 및 도전과제"><i class="fa-solid fa-trophy"></i></div>
                <div class="tab-icon-btn" title="덕질 성향"><i class="fa-solid fa-file-lines"></i></div>
            </div>
            
            <div class="editor-panel">
                <div class="editor-content">
                    <div id="panel-basic" class="editor-tab-content">
                        <div class="section-title">닉네임</div>
                        <input type="text" id="inNick" placeholder="닉네임을 입력하세요">
                        
                        <div class="section-title">타장르 언급</div>
                        <div class="grid-options single-select" style="grid-template-columns: repeat(4, 1fr);">
                            <div class="check-item" onclick="toggleOtherFandom(false, this)">없음</div>
                            <div class="check-item" onclick="toggleOtherFandom(true, this)">가끔</div>
                            <div class="check-item" onclick="toggleOtherFandom(true, this)">보통</div>
                            <div class="check-item" onclick="toggleOtherFandom(true, this)">많음</div>
                        </div>
                        <div id="otherFandomInputArea" class="sub-input" style="display: none;">
                            <input type="text" placeholder="언급하는 타장르를 적어주세요">
                        </div>
                    </div>

                    <div id="panel-game" class="editor-tab-content" style="display: none;">
                        <div class="section-title">버디 (5-5-3 배치)</div>
                        <div class="image-select-grid multi-select-limit" data-group="buddies" data-limit="3" 
                             style="display: flex; flex-wrap: wrap; justify-content: center; gap: 4px;">
                            
                            <div class="img-option" onclick="selectImage(this, 'limit', 3)"><img src="Icons/Buddy Icons/크레이그.png"><span>크레이그</span></div>
                            <div class="img-option" onclick="selectImage(this, 'limit', 3)"><img src="Icons/Buddy Icons/홀리.png"><span>홀리</span></div>
                            <div class="img-option" onclick="selectImage(this, 'limit', 3)"><img src="Icons/Buddy Icons/이리스.png"><span>이리스</span></div>
                            <div class="img-option" onclick="selectImage(this, 'limit', 3)"><img src="Icons/Buddy Icons/야드비가.png"><span>야드비가</span></div>
                            <div class="img-option" onclick="selectImage(this, 'limit', 3)"><img src="Icons/Buddy Icons/조제.png"><span>조제</span></div>
                            <div class="img-option" onclick="selectImage(this, 'limit', 3)"><img src="Icons/Buddy Icons/라비니아.png"><span>라비니아</span></div>
                            <div class="img-option" onclick="selectImage(this, 'limit', 3)"><img src="Icons/Buddy Icons/리세.png"><span>리세</span></div>
                            <div class="img-option" onclick="selectImage(this, 'limit', 3)"><img src="Icons/Buddy Icons/루.png"><span>루</span></div>
                            <div class="img-option" onclick="selectImage(this, 'limit', 3)"><img src="Icons/Buddy Icons/리코리스.png"><span>리코리스</span></div>
                            <div class="img-option" onclick="selectImage(this, 'limit', 3)"><img src="Icons/Buddy Icons/라일.png"><span>라일</span></div>
                            <div class="img-option" onclick="selectImage(this, 'limit', 3)"><img src="Icons/Buddy Icons/노아.png"><span>노아</span></div>
                            <div class="img-option" onclick="selectImage(this, 'limit', 3)"><img src="Icons/Buddy Icons/발렌틴.png"><span>발렌틴</span></div>
                            <div class="img-option" onclick="selectImage(this, 'limit', 3)"><img src="Icons/Buddy Icons/제논.png"><span>제논</span></div>
                        </div>
                    </div>
                </div>
                    
                <div class="sidebar-footer">
                    <button class="save-btn" onclick="saveImage()">
                        <i class="fa-solid fa-download"></i> PNG로 저장
                    </button>
                </div>
            </div>
            <div class="toggle-btn" id="toggleBtn"><i class="fa-solid fa-chevron-left"></i></div>
        </aside>

        <section class="workspace" id="workspace">
            <div id="viewport">
                <div class="preview-box" id="board">
                    <div id="render-nickname" style="position:absolute; top:100px; left:100px; font-size:100px; color:#000;"></div>
                </div>
                <div class="copyright-notice" style="margin-top:50px; color:rgba(255,255,255,0.3); text-align:center;">
                    <p>©Bandai Namco Entertainment Inc. All Rights Reserved.</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        // 사이드바 토글
        document.getElementById('toggleBtn').addEventListener('click', function() {
            const container = document.getElementById('sidebar');
            container.classList.toggle('collapsed');
            this.querySelector('i').className = container.classList.contains('collapsed') ? 'fa-solid fa-chevron-right' : 'fa-solid fa-chevron-left';
        });

        // 탭 전환
        document.querySelectorAll('.tab-icon-btn').forEach((btn, idx) => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-icon-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.editor-tab-content').forEach(p => p.style.display = 'none');
                const panels = ['panel-basic', 'panel-game', 'panel-trophy', 'panel-plus'];
                if(panels[idx]) document.getElementById(panels[idx]).style.display = 'block';
            });
        });

        // 이미지 선택 (둥근 모서리 디자인 포함)
        function selectImage(el, mode, limit) {
            const parent = el.parentElement;
            if (mode === 'limit') {
                if (el.classList.contains('selected')) {
                    el.classList.remove('selected');
                } else if (parent.querySelectorAll('.selected').length < limit) {
                    el.classList.add('selected');
                } else {
                    alert(`최대 ${limit}개까지 선택 가능합니다.`);
                }
            }
        }

        function toggleOtherFandom(show, el) {
            document.getElementById('otherFandomInputArea').style.display = show ? 'block' : 'none';
            el.parentElement.querySelectorAll('.check-item').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }

        // PNG 저장 (기존 로직 유지)
        function saveImage() {
            const board = document.getElementById('board');
            const viewport = document.getElementById('viewport');
            const originalTransform = viewport.style.transform;
            viewport.style.transform = 'none';
            html2canvas(board, { scale: 1, width: 3840, height: 2160, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'CodeVein_Sheet.png';
                link.href = canvas.toDataURL();
                link.click();
                viewport.style.transform = originalTransform;
            });
        }
    </script>
</body>
</html>
